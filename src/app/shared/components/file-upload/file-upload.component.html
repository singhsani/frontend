<div class="row" *ngIf="!fromAdmin">
	<div class="col-md-12">
		<mat-progress-bar *ngIf="currentFileUpload" mode="determinate" value="{{progress.percentage}}"></mat-progress-bar>

		<div *ngIf="currentFileUpload" class="progress">

			<div class="progress-bar progress-bar-info progress-bar-striped" role="progressbar" attr.aria-valuenow="{{progress.percentage}}"
			 aria-valuemin="0" aria-valuemax="100" [ngStyle]="{width:progress.percentage+'%'}">
				{{progress.percentage}}%
			</div>
		</div>

		<div *ngIf="showButton">
			<label class="btn btn-default" [class.disabled]="!form.get('canEdit').value">
				<input #fileInput type="file" [class.disabled]="!form.get('canEdit').value" [disabled]="!form.get('canEdit').value" (change)="selectFile($event)">
			</label>
			<label *ngIf="imagetype">
				<img [src]="priviewImage" alt="image" class="imageSize" />
			</label>

			<button type="button" mat-raised-button color="primary" [disabled]="canUpload || !form.get('canEdit').value" (click)="upload()">
				<mat-icon>file_upload</mat-icon> Upload
			</button>

			<button [disabled]="canView || !form.get('canEdit').value" mat-raised-button type="button" color="accent" (click)="view()">
				View
			</button>

			<button [disabled]="canDelete || !form.get('canEdit').value" mat-raised-button type="button" color="warn" (click)="deleteFile()">
				Delete
			</button>
		</div>
	</div>
</div>
