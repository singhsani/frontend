<div class="container">
    <div class="row pt-4" *ngFor="let module of userServicesList">
        <div class="col-md-4 pt-4 text-center" *ngFor="let service of module.services; let i=index">
            <mat-card>
                <mat-icon>account_circle</mat-icon>
                <mat-card-title>{{service.name}}</mat-card-title>
                <mat-card-actions>
                    <button mat-raised-button color="primary" (click)="createRecord(service.code)">
                        <mat-icon>input</mat-icon> New Application
                    </button>
                </mat-card-actions>
            </mat-card>
        </div>
    </div>
</div>
