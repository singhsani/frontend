<mat-card class="mt-3" *ngIf="modelFileDownload.length>0">
  <div class="row">
    <div class="col-md-12">
      <div class="section-title">
        <h4>Downloads</h4>
        <mat-divider></mat-divider>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-12">
      <button mat-stroked-button class="ml-3" type="button" color="primary" *ngFor="let item of modelFileDownload"
        (click)="downloadFile(item)">
        <mat-icon>arrow_downward</mat-icon>{{item.displayName}}
      </button>
    </div>
  </div>
</mat-card>
