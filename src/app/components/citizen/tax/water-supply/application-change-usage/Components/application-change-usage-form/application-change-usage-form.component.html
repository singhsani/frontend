<mat-horizontal-stepper #stepper (selectionChange)="stepChanged($event, stepper);" class="stepperToTab">
    <mat-step>
        <ng-template matStepLabel>Applicant Details</ng-template>
        <app-applicant-detail-propertywater (stepChange)="stepChangedEvent($event)"
            (applicantDetails)="saveApplicantDetails($event)" [serviceType]="'WTR-CHNG-USG'">
        </app-applicant-detail-propertywater>
    </mat-step>
    <mat-step>
        <ng-template matStepLabel>Detail</ng-template>
        <mat-card>
            <div class="row">
                <div class="col-md-6">
                    <mat-form-field class="full-width-input" hidden>
                        <input matInput trim="blur" placeholder="Application Number" maxlength="20"
                            #ApplicationNo="ngModel" name="applicationNumber"
                            [(ngModel)]="applicationModel.applicationNumber">
                        <mat-error *ngIf="ApplicationNo.invalid">*Application Number is required.</mat-error>
                    </mat-form-field>
                </div>
            </div>
        </mat-card>
        <mat-card class="mt-3">
            <div class="row">
                <div class="col-md-4">
                    <mat-form-field class="full-width-input">
                        <input matInput placeholder="Connection Number" maxlength="50" name="connectioNo"
                            [(ngModel)]="connectioNo">
                    </mat-form-field>
                </div>
                <div class="col-md-2">
                    <button mat-raised-button color="primary" type="button" (click)="searchByConnectionNo()"> Go
                    </button>
                </div>
                <div class="col-md-6">
                    <mat-form-field class="full-width-input">
                        <input disabled matInput placeholder="Owner Name" name="ownerName"
                            [(ngModel)]="connectionsModel.connectionDetail.ownerName">
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <mat-form-field class="full-width-input">
                        <textarea disabled matInput placeholder="Address" name="address"
                            [(ngModel)]="connectionsModel.address"></textarea>
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <mat-form-field class="full-width-input">
                        <input disabled matInput placeholder="Property Dues" name="propertyDues"
                            [(ngModel)]="connectionsModel.propertyDues">
                    </mat-form-field>
                </div>
                <div class="col-md-2">
                    <button *ngIf="isShowSaveButton" class="ml-3" mat-raised-button color="accent" type="button"
                        (click)="onPropertyDetailClick()">
                        <mat-icon>details</mat-icon> Detail
                    </button>
                </div>
                <div class="col-md-4">
                    <mat-form-field class="full-width-input">
                        <input disabled matInput placeholder="Water Dues" name="waterDues"
                            [(ngModel)]="connectionsModel.waterDues">
                    </mat-form-field>
                </div>
                <div class="col-md-2">
                    <button *ngIf="isShowSaveButton" class="ml-3" mat-raised-button color="accent" type="button"
                        (click)="onWaterDetailClick()">
                        <mat-icon>details</mat-icon> Detail
                    </button>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <mat-form-field class="full-width-input">
                        <input disabled matInput placeholder="Current Usage"
                            [(ngModel)]="connectionsModel.connectionDetail.usageName">
                    </mat-form-field>
                </div>
                <div class="col-md-6">
                    <mat-form-field class="full-width-input">
                        <input disabled matInput placeholder="Current Sub-Usage"
                            [(ngModel)]="connectionsModel.connectionDetail.subusageName">
                    </mat-form-field>
                </div>
            </div>
            <form #form="ngForm" (ngSubmit)="save(form)">
                <div class="row">
                    <div class="col-md-6">
                        <div class="ngSelect">
                            <ng-select required placeholder="Connection Usage *" [items]="connectionUsageList"
                                bindValue="usageId" bindLabel="usageName" name="usageId" [(ngModel)]="dataModel.usageId"
                                #UsageId="ngModel" (ngModelChange)="onChangedConnectionUsage($event)"
                                [ngClass]="{'ng-invalid ng-touched':  form.submitted && UsageId.invalid}">
                            </ng-select>
                            <div *ngIf="(form.submitted && UsageId.invalid)  || (UsageId.invalid && UsageId.touched)">
                                <mat-error *ngIf="UsageId.errors.required">*Connection Usage is required.</mat-error>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="ngSelect">
                            <ng-select required placeholder="Connection Sub-Usage *" [items]="connectionSubUsageList"
                                bindValue="subUsageId" bindLabel="subUsage" name="subusageId"
                                [(ngModel)]="dataModel.subusageId" #SubusageId="ngModel"
                                (ngModelChange)="onCheckConnectionUsageAndSubUsage($event)"
                                [ngClass]="{'ng-invalid ng-touched':  form.submitted && SubusageId.invalid}">
                            </ng-select>
                            <div
                                *ngIf="(form.submitted && SubusageId.invalid)  || (SubusageId.invalid && SubusageId.touched)">
                                <mat-error *ngIf="SubusageId.errors.required">*Connection Sub-Usage is required.
                                </mat-error>
                            </div>
                        </div>

                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input matInput required [matDatepicker]="ChangeFromDate" #CFD="ngModel"
                                placeholder="Change From Date" name="changeFromDate"
                                [(ngModel)]="dataModel.changedFromDate" mask-date>
                            <mat-datepicker-toggle matSuffix [for]="ChangeFromDate"></mat-datepicker-toggle>
                            <mat-datepicker #ChangeFromDate disabled="false"></mat-datepicker>
                            <mat-error>{{errorMessage.dateFormateErrorMsg}}</mat-error>
                            <div class="default-show-hint mat-hint mat-right" align="end">
                                {{errorMessage.dateFormateHint}}</div>
                        </mat-form-field>
                    </div>
                </div>
                <div class="col-sm-12 col-md-12 p-4 mt-3" *ngIf="isShowSaveButton">
                    <button mat-raised-button class="ml-3 pull-left" color="primary" type="button" (click)="moveStepper(0)">
                        <mat-icon>skip_previous</mat-icon>Back
                    </button>
                    <button class="ml-3 pull-right" mat-raised-button color="primary" type="submit">
                        <mat-icon>save</mat-icon> Save & Next
                    </button>
                    <button class="ml-3 pull-right" mat-raised-button color="warn" type="button" (click)="clear(form)">
                        <mat-icon>clear_all</mat-icon> Clear
                    </button>
                </div>
            </form>
        </mat-card>
    </mat-step>
    <mat-step>
        <ng-template matStepLabel>Attachment</ng-template>
        <mat-card>
            <div class="row">
                <ng-container *ngFor="let doc of changeOfUsageDocumentUploadDocs">
                    <div class="col-md-4">
                        <label>{{doc.documentLabelEn}}<span *ngIf="doc.mandatory">*</span></label>
                        <file-upload-water-tax [form]="changeOfUsageDocumentUploadDocs" [uploadModel]="doc">
                        </file-upload-water-tax>
                    </div>
                </ng-container>
            </div>

            <div class="col-sm-12 col-md-12">
                <button mat-raised-button class="ml-3 pull-left" color="primary" type="button" (click)="moveStepper(1)">
                    <mat-icon>skip_previous</mat-icon>Back
                </button>
                <button mat-raised-button class="ml-3 pull-right" color="primary" (click)="onSubmitApproved()" type="button">
                    <mat-icon>save</mat-icon>Submit
                </button>
            </div>
        </mat-card>
    </mat-step>
</mat-horizontal-stepper>
