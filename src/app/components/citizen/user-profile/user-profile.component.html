<div class=" col-lg-4 offset-lg-4 col-md-6 offset-md-3 col-sm-8 offset-sm-2">
	<mat-card class="mt-4">
		<h1 class="heading">Profile</h1>
		<mat-card-content class="profilePage">
			<form [formGroup]="userProfileForm" (ngSubmit)="onSubmitProfile(userProfileForm.value)" autocomplete="off" ngNativeValidate novalidate>

				<mat-form-field class="iconMat" >
						<mat-icon matPrefix>face</mat-icon>
					<input matInput type="text" placeholder="Firstname" formControlName="firstName" required>
					<control-messages [control]="userProfileForm.controls.firstName"></control-messages>
				</mat-form-field>

				<mat-form-field class="iconMat" >
						<mat-icon matPrefix>face</mat-icon>
					<input matInput type="text" placeholder="Lastname" formControlName="lastName" required>
					<control-messages [control]="userProfileForm.controls.lastName"></control-messages>
				</mat-form-field>

				<mat-form-field class="iconMat" >
						<mat-icon matPrefix>mail_outline</mat-icon>
					<input matInput type="email" placeholder="Email" formControlName="email" required readonly>
						<control-messages [control]="userProfileForm.controls.email"></control-messages>
				</mat-form-field>

				<mat-form-field class="iconMat" >
						<mat-icon matPrefix>phone_android</mat-icon>
					<input matInput type="tel" OnlyNumber placeholder="Cell Number" formControlName="cellNo" minlength="10" maxlength="10"required readonly>
				</mat-form-field>

				<div class="text-center">
				<button type="submit" mat-raised-button color="primary" [disabled]="userProfileForm.invalid" >
					Submit Profile
				</button>
			</div>

			</form>
		</mat-card-content>
	</mat-card>
</div>
