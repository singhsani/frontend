
<app-title-bar [title]="'Application for No Due Certificate/Payment Certificate'"></app-title-bar>
    <!-- <mat-card class="cardH1">
        <h1>Application for No Due Certificate/Payment Certificate</h1>
    </mat-card> -->


    <mat-horizontal-stepper #stepper (selectionChange)="stepChanged($event, stepper);" class="stepperToTab">
        <mat-step>
          <ng-template matStepLabel>Applicant Details</ng-template>
          <app-applicant-detail-propertywater (stepChange)="stepChangedEvent($event)" (applicantDetails)="saveApplicantDetails($event)"  [serviceType]="'PRO-NDU'"></app-applicant-detail-propertywater>
        </mat-step>
        <mat-step>
          <ng-template matStepLabel>No Due Certificate Details</ng-template>
          <div>
            <!-- Search Component Start -->
            <div *ngIf="!isShowForm">
                <app-no-due-certificate-search></app-no-due-certificate-search>
            </div>
            <!-- Form Component Start -->
            <div *ngIf="isShowForm">
                    <app-payment></app-payment>
            </div>
            <!-- Form Component End -->
            <!-- Table Component Start -->
            <div [hidden]="!isShowTable">
                <app-no-due-certificate-table></app-no-due-certificate-table>
            </div>
            <!-- Table Component End -->
        </div>
        <br>        
        </mat-step>
      
      </mat-horizontal-stepper>
