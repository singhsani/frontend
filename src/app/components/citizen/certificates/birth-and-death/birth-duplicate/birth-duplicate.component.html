<app-title-bar [title]="'screen_title' | translate: translateKey"></app-title-bar>

<record-search *ngIf="showSearchForm" [apiType]="manageRoutes.getApiTypeFromApiCode(this.apiCode)"
    (searchResult)="showDuplicateForm($event)">
</record-search>

<div class="container" [hidden]="isVisibeDuplicateForm">
    <mat-card class="cardBorder">
        <form [formGroup]="birthDuplicateForm" autocomplete="off" ngNativeValidate>
            <div class="row">
                <!-- <div class="col-md-4" formGroupName="duplicateCopies">
                    <mat-label>{{'duplicate_copies' | translate:translateKey}}</mat-label>
                    <mat-radio-group formControlName="code">
                        <mat-radio-button *ngFor="let yesNo of ISYESNO" [value]="yesNo.code">
                            {{yesNo.name}}
                        </mat-radio-button>
                        <control-messages [control]="birthDuplicateForm.get('duplicateCopies').get('code')">
                        </control-messages>
                    </mat-radio-group>
                </div> -->
                <mat-form-field formGroupName="duplicateCopyMode" class="col-md-6">
                    <mat-select placeholder="{{'duplicate_copy_mode' | translate:translateKey}} *"
                        formControlName="code">
                        <mat-option *ngFor="let duplicatemode of DuplicateCopyMode" [value]="duplicatemode.code">
                            {{duplicatemode.name}}
                        </mat-option>
                    </mat-select>
                    <control-messages [control]="birthDuplicateForm.get('duplicateCopyMode').get('code')">
                    </control-messages>
                </mat-form-field>
                <mat-form-field class="col-md-6">
                    <input matInput maxlength="2" type="number" [min]="0" OnlyNumber
                        placeholder="{{'total_copies' | translate:translateKey}} *" formControlName="totalCopies">
                    <control-messages [control]="birthDuplicateForm.get('totalCopies')"></control-messages>
                </mat-form-field>

                <mat-form-field class="col-md-4">
                    <input matInput trim type="text" formControlName="childName"
                        placeholder="{{'child_name' | translate: translateKey}}" readonly>
                </mat-form-field>

                <mat-form-field class="col-md-4">
                    <input matInput trim type="text" formControlName="birthDate"
                        placeholder="{{'birth_date' | translate: translateKey}}" readonly>
                </mat-form-field>

                <mat-form-field class="col-md-4">
                    <input matInput trim type="text" formControlName="birthtime"
                        placeholder="{{'birth_time' | translate: translateKey}}" readonly>
                </mat-form-field>

                <mat-form-field class="col-md-6">
                    <input matInput trim type="text" formControlName="gender" appGujInputSource targetElement="genderguj"
                        placeholder="{{'gender' | translate: translateKey}}" readonly>
                </mat-form-field>

                <mat-form-field class="col-md-6">
                    <input matInput trim type="text" formControlName="placeofbirth" 
                        placeholder="{{'birth_place' | translate: translateKey}}" appGujInputSource targetElement="placeofbirthguj" readonly>
                </mat-form-field>

                <mat-form-field class="col-md-6">
                    <input matInput appPreventSpace appGujInputTarget  
                    placeholder="{{'gender' | translate:translateKey:'gu'}}" formControlName="genderguj" readonly>
                </mat-form-field>

                <mat-form-field class="col-md-6">
                    <input matInput appPreventSpace appGujInputTarget  
                    placeholder="{{'birth_place' | translate:translateKey:'gu'}}" formControlName="placeofbirthguj" readonly>
                </mat-form-field>

                <mat-form-field class="col-md-4">
                    <input matInput trim type="text" formControlName="mothername"
                        placeholder="{{'mother_name' | translate: translateKey}}" readonly>
                </mat-form-field>

                <mat-form-field class="col-md-4">
                    <input matInput trim type="text" formControlName="fathername"
                        placeholder="{{'father_name' | translate: translateKey}}" readonly>
                </mat-form-field>

                <mat-form-field class="col-md-4">
                    <input matInput trim type="text" formControlName="regdate"
                        placeholder="{{'reg_date' | translate: translateKey}}" readonly>
                </mat-form-field>

                <mat-form-field class="col-md-12">
                    <input matInput trim type="text" formControlName="birthaddress" appGujInputSource targetElement="birthaddressguj"
                        placeholder="{{'address' | translate: translateKey}}" readonly>
                </mat-form-field>

                <mat-form-field class="col-md-12">
                    <input matInput appPreventSpace appGujInputTarget  
                    placeholder="{{'address' | translate:translateKey:'gu'}}" formControlName="birthaddressguj" readonly>
                </mat-form-field>

                <mat-form-field class="col-md-12">
                    <input matInput trim type="text" formControlName="permanentadd" appGujInputSource targetElement="permanentaddguj"
                        placeholder="{{'permanent_add' | translate: translateKey}}" readonly>
                </mat-form-field>

                <mat-form-field class="col-md-12">
                    <input matInput appPreventSpace appGujInputTarget  
                    placeholder="{{'permanent_add' | translate:translateKey:'gu'}}" formControlName="permanentaddguj" readonly>
                </mat-form-field>


                
            </div>

            <app-action-bar [isstepper]="false" [form]="birthDuplicateForm" [paymentGateway]="paymentGateway"
                [stepInfo]="{step: 'final', next: 0, back: 0}"></app-action-bar>
        </form>
        <select-payment-gateway #paymentGateway></select-payment-gateway>
    </mat-card>


</div>
