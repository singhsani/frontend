<mat-card class="col-md-12 mt-3">
  <div class="row">
    <div class="col-md-6">
      <div class="ngSelect">
        <ng-select required placeholder="Financial Year *" [items]="financialYear" bindValue="financialYearId"
          bindLabel="displayName" name="financialYearId" [(ngModel)]="model.financialyearId" #FinancialYearId="ngModel"
          [ngClass]="{'ng-invalid ng-touched': isSubmitted && FinancialYearId.invalid}">
        </ng-select>
        <div *ngIf="(isSubmitted && FinancialYearId.invalid)  || (FinancialYearId.invalid && FinancialYearId.touched)">
          <mat-error *ngIf="FinancialYearId.errors.required">*Financial Year is required.</mat-error>
        </div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-12">
      <mat-tab-group mat-align-tabs="center" (selectedTabChange)="onTabChanged($event)">
        <mat-tab label="Property No">
          <div class="margin-20">
            <form #formProperty="ngForm" (ngSubmit)="onSearch(formProperty)">
              <div class="row">
                <div class="col-md-4">
                  <mat-form-field class="full-width-input">
                    <input trim="blur" matInput mask-property-no-with-occuiper-code maxlength="16" minlength="12"
                      required #PropertyNo="ngModel" [(ngModel)]="model.propertyNo" name="propertyNo"
                      placeholder="Property No">
                    <mat-error *ngIf="PropertyNo.invalid">*Property No is required.</mat-error>
                  </mat-form-field>
                </div>
                <div class="col-md-2">
                  <button class="ml-3" mat-raised-button color="primary" type="submit">
                    <mat-icon>search</mat-icon> Search
                  </button>
                </div>
              </div>
            </form>
          </div>
        </mat-tab>
        <mat-tab label="Area / Usage">
          <div class="margin-20">
            <form #formAreaUsage="ngForm" (ngSubmit)="onSearch(formAreaUsage)">

              <div class="row">
                <div class="col-md-6">
                  <div class="ngSelect" *ngIf="wardZoneLevel.length>=1">
                    <ng-select [placeholder]="!wardZoneLevel[0]?'': wardZoneLevel[0].levelName"
                      [items]="wardZoneLevel1List" bindValue="parentWardzoneId" bindLabel="wardzoneName" name="level1Id"
                      [(ngModel)]="model.level1Id" (ngModelChange)="onChangedWardZone($event,2)">
                    </ng-select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="ngSelect" *ngIf="wardZoneLevel.length>=1">
                    <ng-select [placeholder]="!wardZoneLevel[1]?'': wardZoneLevel[1].levelName"
                      [items]="wardZoneLevel2List" bindValue="wardzoneId" bindLabel="wardzoneName" name="level2Id"
                      [(ngModel)]="model.level2Id" (ngModelChange)="onChangedWardZone($event,3)">
                    </ng-select>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="ngSelect" *ngIf="wardZoneLevel.length>=3">
                    <ng-select [placeholder]="!wardZoneLevel[2]?'': wardZoneLevel[2].levelName"
                      [items]="wardZoneLevel3List" bindValue="wardzoneId" bindLabel="wardzoneName" name="level3Id"
                      [(ngModel)]="model.level3Id" (ngModelChange)="onChangedWardZone($event,4)">
                    </ng-select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="ngSelect" *ngIf="wardZoneLevel.length>=4">
                    <ng-select [placeholder]="!wardZoneLevel[3]?'': wardZoneLevel[3].levelName"
                      [items]="wardZoneLevel4List" bindValue="wardzoneId" bindLabel="wardzoneName" name="level4Id"
                      [(ngModel)]="model.level4Id">
                    </ng-select>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="ngSelect">
                    <ng-select placeholder="Usage" [items]="usageList" bindValue="usageId" bindLabel="usageName"
                      name="usageId" [(ngModel)]="model.usageId" (ngModelChange)="onChangedUsage($event)">
                    </ng-select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="ngSelect">
                    <ng-select placeholder="Sub-Usage" [items]="subUsageList" bindValue="subUsageId"
                      bindLabel="subUsage" name="subUsageId" [(ngModel)]="model.subUsageId">
                    </ng-select>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="ngSelect">
                    <ng-select placeholder="Property Type" [items]="propertyTypeList" bindValue="propertyTypeId"
                      bindLabel="propertyType" name="propertyTypeId" [(ngModel)]="model.propertyTypeId"
                      (ngModelChange)="onChangedPropertyType($event)">
                    </ng-select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="ngSelect">
                    <ng-select placeholder="Property Sub-Type" [items]="propertySubTypeList"
                      bindValue="subPropertyTypeId" bindLabel="subPropertyType" name="propertySubTypeId"
                      [(ngModel)]="model.propertySubTypeId">
                    </ng-select>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-12 text-right">
                  <button class="ml-3" mat-raised-button color="primary" type="submit">
                    <mat-icon>search</mat-icon> Search
                  </button>
                  <button mat-raised-button class="ml-3" type="button" color="warn" (click)="onClear()">
                    <mat-icon>clear_all</mat-icon> Clear
                  </button>
                </div>
              </div>
            </form>
          </div>
        </mat-tab>

    </div>
  </div>
</mat-card>
