<mat-card class="borderRadius10">
	<div class="headingBox">Reset Password
		<span>Please choose a new password</span>
	</div>

	<form [formGroup]="resetPassForm" (ngSubmit)="onResetPassword(resetPassForm)" autocomplete="off" ngNativeValidate>

		<mat-form-field class="example-full-width iconMat">
			<mat-icon matPrefix>chat_bubble_outline</mat-icon>
			<input matInput type="text" placeholder="Enter OTP" formControlName="code" required>
		</mat-form-field>

		<mat-form-field class="example-full-width iconMat">
			<mat-icon matPrefix>lock_outline</mat-icon>
			<input matInput type="password" placeholder="Password" formControlName="password" required maxlength="50">
			<control-messages [control]="resetPassForm.controls.password"></control-messages>
		</mat-form-field>

		<mat-form-field class="example-full-width iconMat">
			<mat-icon matPrefix>lock_outline</mat-icon>
			<input matInput type="password" placeholder="Confirm Password" formControlName="confirmPassword" maxlength="50" required>
			<control-messages [control]="resetPassForm.controls.confirmPassword"></control-messages>
		</mat-form-field>

		<div class="row">
			<mat-error *ngIf="resetPassForm.errors?.mismatchedPasswords">Password not match</mat-error>
		</div>

		<div class="text-center">
			<button type="submit" mat-raised-button color="primary" [disabled]="resetPassForm.invalid">
				Submit
			</button>
		</div>
	</form>

</mat-card>
