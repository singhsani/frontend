
<div class="container pt-4">
    
    <mat-card class="themeBox">
        <div class="row ">
            <h2 class="h2">
                <mat-icon>search</mat-icon>
                <span>Search Application</span>
            </h2>
            <div class="col-md-4">
                dfgfdg
            </div>
            <div class="col-md-6">
                    dfgfdg
            </div>
            <div class="col">
                    dfgfdg
            </div>
        </div>
        </mat-card>


        <mat-card class="themeBox servicesList">
    <div class="row ">
        <h2 class="h2">
            <mat-icon>dashboard</mat-icon>
            <span>Services</span>
        </h2>
        <div class="col"  *ngFor="let module of userServicesList">
            <img src="assets/icons/i1.png" alt=""><br>
            {{module.name +' / '+ module.gujName}}</div>
    </div>
    </mat-card>


    <div class="row pt-1 pb-2">
        <div class="col-md-12">
            <input class="form-control col-md-4 float-right" placeholder="Enter Application Name" type="text" [(ngModel)]="search">
        </div>
    </div>

    <mat-accordion *ngFor="let module of userServicesList">
        <mat-expansion-panel>
            <mat-expansion-panel-header>
                <mat-panel-title>
                    {{module.name +' / '+ module.gujName}}
                </mat-panel-title>
            </mat-expansion-panel-header>

            <div class="row">
                <!-- <div class="col-md-4 pt-4 pb-1 text-center bg-light" *ngFor="let service of module.services;"> -->
                <div class="col-12 col-sm-6 col-md-6 col-lg-4 pb-4 text-center dashboardList" *ngFor="let service of module.services;">
                    <mat-card>
                        <mat-icon>account_circle</mat-icon>
                        <mat-card-title innerHTML="{{ service.name +' / '+ service.gujName | highlight : search }}"></mat-card-title>
                        <mat-card-actions>
                            <button mat-raised-button color="primary" (click)="createRecord(service.code)">
                                <mat-icon>input</mat-icon> New Application
                            </button>
                        </mat-card-actions>
                    </mat-card>
                </div>
            </div>

        </mat-expansion-panel>
    </mat-accordion>
</div>
