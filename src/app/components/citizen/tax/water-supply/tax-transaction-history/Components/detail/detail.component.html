<mat-card class="col-md-12 mt-3">
  <div class="row">
    <div class="col-md-6">
      <div class="section-title">
        <h4>Detail</h4>
      </div>
    </div>
    <!-- <div class="col-md-6 text-right">
      <button mat-raised-button class="ml-3" color="primary" type="button" (click)="cancelForm()">
        <mat-icon>skip_previous</mat-icon> Back
      </button>
    </div> -->
    <hr class="margin-top-10">
  </div>
  <div class="row">
    <div class="col-md-12">
      <table mat-table [dataSource]="dataSource" class="width100">
        <ng-container matColumnDef="taxName">
          <th mat-header-cell *matHeaderCellDef>Tax Name </th>
          <td mat-cell *matCellDef="let element"> {{element.taxName}} </td>
          <td style="font-weight:bold" mat-footer-cell *matFooterCellDef> Total</td>
        </ng-container>
        <ng-container matColumnDef="billAmount">
          <th mat-header-cell *matHeaderCellDef> Bill Amount</th>
          <td mat-cell *matCellDef="let element"> {{element.billAmount}} </td>
          <td style="font-weight:bold" mat-footer-cell *matFooterCellDef> {{totalBillAmount}} </td>
        </ng-container>
        <ng-container matColumnDef="paidAmount">
          <th mat-header-cell *matHeaderCellDef> Paid Amount</th>
          <td mat-cell *matCellDef="let element"> {{element.paidAmount}} </td>
          <td style="font-weight:bold" mat-footer-cell *matFooterCellDef> {{totalPaidAmount}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr mat-footer-row *matFooterRowDef="displayedColumns"></tr>
      </table>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6 text-left">
      <button mat-raised-button class="ml-3" color="primary" type="button" (click)="cancelForm()">
        <mat-icon>skip_previous</mat-icon> Back
      </button>
    </div>
  </div>
</mat-card>
