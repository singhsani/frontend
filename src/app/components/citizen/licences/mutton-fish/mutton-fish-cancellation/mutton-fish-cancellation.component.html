<app-title-bar [title]="'screen_title' | translate: translateKey"></app-title-bar>

<mat-card [hidden]="serachLicenceObj.isDisplayCancellationLicenceForm" class="mt-4 formClass">
	<mat-form-field class="col-md-10">
		<input matInput required placeholder="{{'search_by_application_no' | translate:translateKey}}" [(ngModel)]="serachLicenceObj.searchLicenceNumber">
	</mat-form-field>
	<button class="col-md-2" mat-raised-button color="primary" (click)="searchLicence()">{{'search' | translate:translateKey}}</button>
</mat-card>

<mat-card [hidden]="!serachLicenceObj.isDisplayCancellationLicenceForm" class="formClass cardBorder">
	<form [formGroup]="muttonFishCancellationForm">
		<mat-tab-group [(selectedIndex)]="tabIndex" dynamicHeight="true" mat-stretch-tabs class="stepperNav">

			<!-- step 1 Starts -->
			<mat-tab>
				<ng-template mat-tab-label>
					<div>{{'license_holder_detail' | translate:translateKey}}</div>
				</ng-template>

				<div class="row">

					<div class="col-md-4 ngSelect" formGroupName="licenseType">
						<ng-select placeholder="{{'license_type' | translate:translateKey}} *" formControlName="code">
							<ng-option *ngFor="let type of MF_LICENSE_TYPE" [value]="type.code">{{type.name}}</ng-option>
						</ng-select>
						<control-messages [control]="muttonFishCancellationForm.get('licenseType').controls.code"></control-messages>
					</div>
				</div>
				<div class="row">
					<div class="col-md-2 ngSelect" formGroupName="personType">
						<ng-select placeholder="{{'person_type' | translate:translateKey}} *" formControlName="code">
							<ng-option *ngFor="let type of PERSON_TYPE" [value]="type.code">{{type.name}}</ng-option>
						</ng-select>
						<control-messages [control]="muttonFishCancellationForm.get('personType').controls.code"></control-messages>
					</div>
					<mat-form-field class="col-md-2">
						<input matInput type="text" required maxlength="30" appValidationFields validationFieldsType='onlyNameWithOutSpace' placeholder="{{'holder_firstname' | translate:translateKey}}" formControlName="holderFirstName"
						 appGujInputSource targetElement="holderFirstNameGuj" [form]="muttonFishCancellationForm">
						<control-messages [control]="muttonFishCancellationForm.controls.holderFirstName"></control-messages>
					</mat-form-field>
					<mat-form-field class="col-md-4">
						<input matInput type="text" required maxlength="30" appValidationFields validationFieldsType='onlyNameWithOutSpace' placeholder="{{'holder_middlename' | translate:translateKey}}" formControlName="holderMiddleName"
						 appGujInputSource targetElement="holderMiddleNameGuj" [form]="muttonFishCancellationForm">
						<control-messages [control]="muttonFishCancellationForm.controls.holderMiddleName"></control-messages>
					</mat-form-field>
					<mat-form-field class="col-md-4">
						<input matInput type="text" required maxlength="30" appValidationFields validationFieldsType='onlyNameWithOutSpace' placeholder="{{'holder_lastname' | translate:translateKey}}" formControlName="holderLastName"
						 appGujInputSource targetElement="holderLastNameGuj" [form]="muttonFishCancellationForm">
						<control-messages [control]="muttonFishCancellationForm.controls.holderLastName"></control-messages>
					</mat-form-field>
				</div>

				<!-- gujarati -->
				<div class="row">
					<mat-form-field class="col-md-4">
						<input matInput type="text" maxlength="90" required formControlName="holderFirstNameGuj" appGujInputTarget [form]="muttonFishCancellationForm"
						 placeholder="{{ 'holder_firstname' | translate:translateKey:'gu' }}">
						<control-messages [control]="muttonFishCancellationForm.controls.holderFirstNameGuj"></control-messages>
					</mat-form-field>
					<mat-form-field class="col-md-4">
						<input matInput type="text" required maxlength="90" placeholder="{{'holder_middlename' | translate:translateKey}}" formControlName="holderMiddleNameGuj"
						 appGujInputTarget [form]="muttonFishCancellationForm">
						<control-messages [control]="muttonFishCancellationForm.controls.holderMiddleNameGuj"></control-messages>
					</mat-form-field>
					<mat-form-field class="col-md-4">
						<input matInput type="text" required maxlength="90" placeholder="{{'holder_lastname' | translate:translateKey}}" formControlName="holderLastNameGuj"
						 appGujInputTarget [form]="muttonFishCancellationForm">
						<control-messages [control]="muttonFishCancellationForm.controls.holderLastNameGuj"></control-messages>
					</mat-form-field>
				</div>
				<!-- /gujarati -->

				<div class="row">
					<h2>{{'permanat_address' | translate:translateKey}}</h2>
					<app-address #permanantAddressEstablishment [requiredFeilds]="muttonFishCancellationForm.controls.permanantAddress.value"
					 [addressFormGroup]="muttonFishCancellationForm.controls.permanantAddress"></app-address>
				</div>
				<div class="row">
					<h2>{{'temp_address' | translate:translateKey}}</h2>
					<app-address #temporaryAddressEstablishment [requiredFeilds]="muttonFishCancellationForm.controls.temporaryAddress.value"
					 [addressFormGroup]="muttonFishCancellationForm.controls.temporaryAddress"></app-address>
				</div>

				<mat-form-field class="col-md-4">
					<input matInput OnlyNumber maxlength="12" formControlName="holderTelephoneNo" placeholder="{{'holder_telephone_no' | translate:translateKey}}">
				</mat-form-field>
				<mat-form-field class="col-md-4">
					<input matInput OnlyNumber maxlength="11" formControlName="holderMobileNo" placeholder="{{'holder_mobile_no' | translate:translateKey}}">
				</mat-form-field>
				<mat-form-field class="col-md-4">
					<input matInput OnlyNumber maxlength="12" formControlName="holderFaxNo" placeholder="{{'holder_fax_no' | translate:translateKey}}">
				</mat-form-field>
				<mat-form-field class="col-md-4">
					<input matInput OnlyNumber maxlength="12" formControlName="holderAadharNo" placeholder="{{'holder_aadhar_no' | translate:translateKey}}">
				</mat-form-field>
				<mat-form-field class="col-md-4">
					<input matInput appAlphaNumeric maxlength="10" formControlName="holderPanNo" placeholder="{{'holder_pan_no' | translate:translateKey}}">
				</mat-form-field>

				<mat-form-field class="col-md-4">
					<input matInput type="text" required maxlength="200" placeholder="{{'license_cancelation_reason' | translate:translateKey}}" formControlName="reason">
					<control-messages [control]="muttonFishCancellationForm.controls.reason"></control-messages>
				</mat-form-field>

				<app-action-bar [uploadFiles]="uploadFileArray" [form]="muttonFishCancellationForm" (handleErrors)="handleErrorsOnSubmit($event)"
				 (tabIndex)="onTabChange($event) " [stepInfo]="{step: 'final', next:0, back:0} "></app-action-bar>

			</mat-tab>
			<!-- step 1 Ends -->

		</mat-tab-group>
	</form>
	<!-- {{ muttonFishCancellationForm.value | json }} -->
</mat-card>
