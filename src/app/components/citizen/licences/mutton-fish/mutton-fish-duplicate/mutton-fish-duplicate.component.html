<app-title-bar [title]="'screen_title' | translate: translateKey"></app-title-bar>

<mat-card [hidden]="serachLicenceObj.isDisplayDuplicateLicenceForm" class="mt-4 formClass">
	<mat-form-field>
		<input matInput upperCase appAlphaNumeric required placeholder="{{'search_by_application_no' | translate:translateKey}}"
			[(ngModel)]="serachLicenceObj.searchLicenceNumber" maxlength="25">
	</mat-form-field>
	<button [disabled]="!serachLicenceObj.searchLicenceNumber" mat-raised-button color="primary"
		(click)="searchLicence()">{{'search' | translate:translateKey}}</button>
</mat-card>

<mat-card [hidden]="!serachLicenceObj.isDisplayDuplicateLicenceForm" class="formClass cardBorder">
	<form [formGroup]="muttonFishDuplicateForm">
		<mat-tab-group [(selectedIndex)]="licenseConfiguration.currentTabIndex" dynamicHeight="true" mat-stretch-tabs
			class="stepperNav">

			<!-- step 1 Starts -->
			<mat-tab>
				<ng-template mat-tab-label>
					<div>{{'license_holder_detail' | translate:translateKey}}</div>
				</ng-template>

				<div class="row">
					<mat-form-field class="col-md-4">
						<input matInput readonly required placeholder="{{'license_no' | translate:translateKey}}"
							formControlName="refNumber">
						<control-messages [control]="muttonFishDuplicateForm.get('refNumber')"></control-messages>
					</mat-form-field>
					<!--<mat-form-field class="col-md-4">-->
						<!--<input matInput readonly placeholder="{{'issue_date' | translate:translateKey}}"-->
							<!--formControlName="licenseIssueDate">-->
						<!--<control-messages [control]="muttonFishDuplicateForm.get('licenseIssueDate')">-->
						<!--</control-messages>-->
					<!--</mat-form-field>-->

          <mat-form-field class="col-md-4">
            <input matInput  disabled readonly autocomplete="off" appDate
                   [matDatepicker]="DateOflicenseIssueDate" formControlName="licenseIssueDate"
                   (dateChange)="dateFormat($event.value,'licenseIssueDate')"
                   placeholder="{{ 'issue_date' | translate:translateKey }}">
            <mat-datepicker-toggle matSuffix [for]="DateOflicenseIssueDate"></mat-datepicker-toggle>
            <mat-datepicker touchUi="true" #DateOflicenseIssueDate></mat-datepicker>
            <div align="end" class="default-show-hint mat-hint mat-right">
              {{licenseConfiguration.DATE_HINT_MSG}}</div>
            <control-messages [control]="muttonFishDuplicateForm.get('licenseIssueDate')">
            </control-messages>
          </mat-form-field>
				</div>

				<div class="row">

					<div class="col-md-4 ngSelect" formGroupName="licenseType">
						<ng-select placeholder="{{'license_type' | translate:translateKey}}" class="asteriskmarkRequired" formControlName="code">
							<ng-option *ngFor="let type of MF_LICENSE_TYPE" [value]="type.code">{{type.name}}
							</ng-option>
						</ng-select>
						<control-messages [control]="muttonFishDuplicateForm.get('licenseType').get('code')">
						</control-messages>
					</div>
				</div>
				<div class="row">
					<div class="col-md-2 ngSelect" formGroupName="personType">
						<ng-select placeholder="{{'person_type' | translate:translateKey}}" class="asteriskmarkRequired" formControlName="code">
							<ng-option *ngFor="let type of PERSON_TYPE" [value]="type.code">{{type.name}}</ng-option>
						</ng-select>
						<control-messages [control]="muttonFishDuplicateForm.get('personType').get('code')">
						</control-messages>
					</div>
					<mat-form-field class="col-md-2">
						<input matInput type="text" required maxlength="30" appValidationFields
							validationFieldsType='onlyNameWithOutSpace'
							placeholder="{{'holder_firstname' | translate:translateKey}}"
							formControlName="holderFirstName" appGujInputSource targetElement="holderFirstNameGuj"
							[form]="muttonFishDuplicateForm">
						<control-messages [control]="muttonFishDuplicateForm.get('holderFirstName')"></control-messages>
					</mat-form-field>
					<mat-form-field class="col-md-4">
						<input matInput type="text" required maxlength="30" appValidationFields
							validationFieldsType='onlyNameWithOutSpace'
							placeholder="{{'holder_middlename' | translate:translateKey}}"
							formControlName="holderMiddleName" appGujInputSource targetElement="holderMiddleNameGuj"
							[form]="muttonFishDuplicateForm">
						<control-messages [control]="muttonFishDuplicateForm.get('holderMiddleName')">
						</control-messages>
					</mat-form-field>
					<mat-form-field class="col-md-4">
						<input matInput type="text" required maxlength="30" appValidationFields
							validationFieldsType='onlyNameWithOutSpace'
							placeholder="{{'holder_lastname' | translate:translateKey}}"
							formControlName="holderLastName" appGujInputSource targetElement="holderLastNameGuj"
							[form]="muttonFishDuplicateForm">
						<control-messages [control]="muttonFishDuplicateForm.get('holderLastName')"></control-messages>
					</mat-form-field>
				</div>

				<!-- gujarati -->
				<div class="row">
					<mat-form-field class="col-md-4">
						<input matInput type="text" maxlength="90" required formControlName="holderFirstNameGuj"
							appGujInputTarget [form]="muttonFishDuplicateForm"
							placeholder="{{ 'holder_firstname' | translate:translateKey:'gu' }}" appValidationFields
							validationFieldsType='onlyNameWithOutSpace'>
						<control-messages [control]="muttonFishDuplicateForm.get('holderFirstNameGuj')">
						</control-messages>
					</mat-form-field>
					<mat-form-field class="col-md-4">
						<input matInput type="text" required maxlength="90"
							placeholder="{{'holder_middlename' | translate:translateKey:'gu'}}"
							formControlName="holderMiddleNameGuj" appGujInputTarget [form]="muttonFishDuplicateForm"
							appValidationFields validationFieldsType='onlyNameWithOutSpace'>
						<control-messages [control]="muttonFishDuplicateForm.get('holderMiddleNameGuj')">
						</control-messages>
					</mat-form-field>
					<mat-form-field class="col-md-4">
						<input matInput type="text" required maxlength="90"
							placeholder="{{'holder_lastname' | translate:translateKey:'gu'}}"
							formControlName="holderLastNameGuj" appGujInputTarget [form]="muttonFishDuplicateForm"
							appValidationFields validationFieldsType='onlyNameWithOutSpace'>
						<control-messages [control]="muttonFishDuplicateForm.get('holderLastNameGuj')">
						</control-messages>
					</mat-form-field>
				</div>
				<!-- /gujarati -->

				<div class="row">
					<h2>{{'permanat_address' | translate:translateKey}}</h2>
					<app-address #permanantAddressEstablishment
						[requiredFeilds]="muttonFishDuplicateForm.get('permanantAddress').value"
						[addressFormGroup]="muttonFishDuplicateForm.get('permanantAddress')"></app-address>
				</div>
				<div class="row">
					<h2>{{'temp_address' | translate:translateKey}}</h2>
					<app-address #temporaryAddressEstablishment
						[requiredFeilds]="muttonFishDuplicateForm.get('temporaryAddress').value"
						[addressFormGroup]="muttonFishDuplicateForm.get('temporaryAddress')"></app-address>
				</div>

				<mat-form-field class="col-md-4">
					<input matInput OnlyNumber maxlength="11" minlength="11" formControlName="holderTelephoneNo"
						placeholder="{{'holder_telephone_no' | translate:translateKey}}">
				</mat-form-field>
				<mat-form-field class="col-md-4">
					<input matInput OnlyNumber maxlength="10" minlength="10" formControlName="holderMobileNo"
						placeholder="{{'holder_mobile_no' | translate:translateKey}}">
				</mat-form-field>
				<mat-form-field class="col-md-4">
					<input matInput OnlyNumber maxlength="12" formControlName="holderFaxNo"
						placeholder="{{'holder_fax_no' | translate:translateKey}}">
				</mat-form-field>
				<mat-form-field class="col-md-4">
					<input matInput OnlyNumber maxlength="12" required formControlName="holderAadharNo"
						placeholder="{{'holder_aadhar_no' | translate:translateKey}}">
				</mat-form-field>
				<mat-form-field class="col-md-4">
					<input matInput appAlphaNumeric maxlength="10" required formControlName="holderPanNo"
						placeholder="{{'holder_pan_no' | translate:translateKey}}">
				</mat-form-field>
				<mat-form-field class="col-md-4">
					<input matInput required maxlength="2" readonly OnlyNumber placeholder="{{'no_of_copies' | translate:translateKey}}" formControlName="noOfCopies"
					(change)="changeNoOfCopies($event)">
					<control-messages [control]="muttonFishDuplicateForm.get('noOfCopies')"></control-messages>
				  </mat-form-field>

				<app-action-bar  [paymentGateway]="paymentGateway" [uploadFiles]="uploadFileArray" [form]="muttonFishDuplicateForm"
					(handleErrors)="handleErrorsOnSubmit($event)"
					(tabIndex)="licenseConfiguration.onFormTabChange($event) "
					[stepInfo]="{step: 'final', next:0, back:0} "></app-action-bar>

					
			</mat-tab>
			<!-- step 1 Ends -->
			<select-payment-gateway #paymentGateway></select-payment-gateway>
		</mat-tab-group>
	</form>
	<!-- {{ muttonFishDuplicateForm.value | json }} -->
</mat-card>
