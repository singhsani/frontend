<div class="container">
	<app-title-bar [title]="'screen_title' | translate: translateKey"></app-title-bar>
	<mat-card class="mt-4 formClass">
		<form [formGroup]="cremationForm">
			<mat-horizontal-stepper [linear]="false">

				<!-- first step start-->
				<mat-step [label]="stepLable1 | translate: translateKey">

					<div class="row">
						<div formGroupName="applicantRelation" class="col-md-6">
							<mat-label>{{'relation' | translate: translateKey}}</mat-label>
							<mat-radio-group formControlName="code" required (change)="realtionChange($event)">
								<mat-radio-button [value]="relation.code" *ngFor="let relation of relationshipArray">{{relation.name}}</mat-radio-button>
								<control-messages [control]="cremationForm.controls.applicantRelation.controls.code"></control-messages>
							</mat-radio-group>
						</div>

						<mat-form-field class="col-md-3" *ngIf="relationFlag">
							<input matInput type="text" formControlName="applicantRelationDetail" placeholder="{{'applicant_relation_detail' | translate: translateKey}}">
						</mat-form-field>

						<div formGroupName="applicantProof" [class.col-md-6]="!relationFlag" [class.col-md-3]="relationFlag">
							<ng-select placeholder="{{'applicant_proof' | translate: translateKey}}" name="relation" formControlName="code" required>
								<ng-option *ngFor="let relation of applicantProof" [value]="relation.code">{{relation.name}}</ng-option>
							</ng-select>
							<control-messages [control]="cremationForm.controls.applicantProof.controls.code"></control-messages>
						</div>

					</div>

					<div>Address:
						<app-address #address [addressFormGroup]="cremationForm.controls.applicantAddress"></app-address>
					</div>

					<app-action-bar [form]="cremationForm" [step]="'step1'" (stepReset)="stepReset()" (handleErrors)="handleErrorsOnSubmit($event)"></app-action-bar>

				</mat-step>

				<!-- end first step -->

				<!-- second step start-->
				<mat-step [label]="stepLable2 | translate: translateKey">

					<div class="row">

						<mat-form-field class="col-md-6">
							<input matInput [matDatepicker]="picker" [max]="maxDate" formControlName="deathDate" (dateChange)="onDateChange($event.value)"
							 placeholder="{{'date_of_death' | translate: translateKey}}" required (focus)="picker.open()">
							<mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
							<mat-datepicker touchUi="true" #picker></mat-datepicker>
							<control-messages [control]="cremationForm.controls.deathDate"></control-messages>
						</mat-form-field>

						<div formGroupName="gender" class="col-md-6">
							<mat-label>{{'gender' | translate: translateKey}}</mat-label>
							<mat-radio-group formControlName="code" required>
								<mat-radio-button [value]="gender.code" *ngFor="let gender of genderArray">{{gender.name +'/'+gender.gujName }}
								</mat-radio-button>
								<control-messages [control]="cremationForm.controls.gender.controls.code"></control-messages>
							</mat-radio-group>
						</div>

						<mat-form-field class="col-md-4">
							<input matInput type="text" formControlName="deceasedName" placeholder="{{'deceased_name' | translate: translateKey}}" required>
							<control-messages [control]="cremationForm.controls.deceasedName"></control-messages>
						</mat-form-field>

						<div formGroupName="deathPlace" class="col-md-4">
							<mat-label>{{'place_of_death' | translate: translateKey}}</mat-label>
							<mat-radio-group formControlName="code" required (change)="placeChange($event)">
								<mat-radio-button [value]="place.code" *ngFor="let place of placeArray">{{place.name}}</mat-radio-button>
							</mat-radio-group>
							<control-messages [control]="cremationForm.controls.deathPlace.controls.code"></control-messages>
						</div>

						<mat-form-field class="col-md-4" *ngIf="cremationForm.get('deathPlace').get('code').value == 'OTHER_PLACE'">
							<input matInput type="text" formControlName="deathPlaceDetail" placeholder="{{'death_place_detail' | translate: translateKey}}">
						</mat-form-field>

					</div>

					<div>Basic Details:
						<app-basic-details [basicFormGroup]="cremationForm"></app-basic-details>
					</div>

					<div>Address:
						<app-address #address [addressFormGroup]="cremationForm.controls.cremationAddress"></app-address>
					</div>

					<app-action-bar [form]="cremationForm" [step]="'final'" (stepReset)="stepReset()" (handleErrors)="handleErrorsOnSubmit($event)"></app-action-bar>

				</mat-step>
				<!-- second step end-->

			</mat-horizontal-stepper>
		</form>
	</mat-card>
</div>
