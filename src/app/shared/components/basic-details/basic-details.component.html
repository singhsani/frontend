<div class ="row" [formGroup]="basicFormGroup">
    <mat-form-field class="col-md-4">
        <input maxlength="50" matInput  appValidationFields [validationFieldsType]="'onlyNameWithOutSpace'" placeholder="{{'first_name' | translate:translateKey}}" formControlName="firstName" required>
        <control-messages [control]="basicFormGroup.get('firstName')"></control-messages>
    </mat-form-field>

    <mat-form-field class="col-md-4">
        <input maxlength="50" matInput appValidationFields [validationFieldsType]="'onlyNameWithOutSpace'" placeholder="{{'middle_name' | translate:translateKey}}" formControlName="middleName">
        <control-messages [control]="basicFormGroup.get('middleName')"></control-messages>
    </mat-form-field>
    
    <mat-form-field class="col-md-4">
        <input maxlength="50" matInput appValidationFields [validationFieldsType]="'onlyNameWithOutSpace'" placeholder="{{'last_name' | translate:translateKey}}" formControlName="lastName" required>
        <control-messages [control]="basicFormGroup.get('lastName')"></control-messages>
    </mat-form-field>

    <mat-form-field class="col-md-4">
        <input matInput  OnlyNumber maxlength="12" minlength="12" placeholder="{{'aadhar_number' | translate:translateKey}}" formControlName="aadhaarNo">
        <control-messages [control]="basicFormGroup.get('aadhaarNo')"></control-messages>
    </mat-form-field>

    <mat-form-field class="col-md-4">
        <span matPrefix>+91 &nbsp;</span>
        <input matInput  OnlyNumber placeholder="{{'applicant_mobile' | translate:translateKey}}" type="tel" maxlength="10" minlength="10"
        formControlName="contactNo" required>
        <!-- <control-messages [control]="basicFormGroup.get('contactNo')"></control-messages> -->
        <mat-error class="mat-error ng-star-inserted errors-massage"
            *ngIf="basicFormGroup.get('contactNo').invalid && (basicFormGroup.get('contactNo').dirty || basicFormGroup.get('contactNo').touched)">
            <div *ngIf="basicFormGroup.get('contactNo').errors.required">
                Applicant Mobile is Required.
            </div>
        </mat-error>
    </mat-form-field>

    <mat-form-field class="col-md-4">
        <input matInput  appPreventSpace maxlength="50" placeholder="{{'applicant_email' | translate:translateKey}}"
        type="email" formControlName="email" pattern='(([^<>()[\]\\.,;:\s@\"]+(\.[^<>()[\]\\.,;:\s@\"]+)*)|(\".+\"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,3}))$' required>
        <control-messages [control]="basicFormGroup.get('email')"></control-messages>
    </mat-form-field>
</div>
