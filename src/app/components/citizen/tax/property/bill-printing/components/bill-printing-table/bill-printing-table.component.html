<div class="mt-4">
  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8 width100">
    <ng-container matColumnDef="select">
      <th mat-header-cell *matHeaderCellDef>
        <mat-checkbox (change)="$event ? masterToggle() : null" [checked]="selection.hasValue() && isAllSelected()"
          [indeterminate]="selection.hasValue() && !isAllSelected()">
        </mat-checkbox>
      </th>
      <td mat-cell *matCellDef="let element">
        <mat-checkbox (click)="$event.stopPropagation()" (change)="$event ? selection.toggle(element) : null" [checked]="selection.isSelected(element)">
        </mat-checkbox>
      </td>
    </ng-container>
    <ng-container matColumnDef="propertyNo">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Property No</th>
      <td mat-cell *matCellDef="let element"> {{element.propertyNo}} </td>
    </ng-container>
    <ng-container matColumnDef="ownerName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Owner Name </th>
      <td mat-cell *matCellDef="let element"> {{element.ownerName}} </td>
    </ng-container>
    <ng-container matColumnDef="occupierName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Occupier Name </th>
      <td mat-cell *matCellDef="let element"> {{element.occupierName}} </td>
    </ng-container>
    <ng-container matColumnDef="assessmentYear">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Assessment Year </th>
      <td mat-cell *matCellDef="let element"> {{element.assessmentYear}} </td>
    </ng-container>
    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef>Action</th>
      <td mat-cell *matCellDef="let element">
        <button mat-button title="Delete" class="btn-width-auto" color="warn" type="button"
          (click)="delete(element)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  <mat-paginator [length]="resultsLength" [pageSizeOptions]="pageRecord" showFirstLastButtons></mat-paginator> 

</div>
<div class="row margin-top-20">
  <div class="col-md-2">
    <mat-card>Selected Count : <b>{{selection.selected.length}}</b></mat-card>
  </div>
  <div class="col-md-2">
    <mat-card>Total Count : <b>{{totalCount}}</b></mat-card>
  </div>
  <div class="col-md-8 text-right">
    <button class="ml-3" mat-raised-button color="primary" type="button" (click)="onPrintBill()">
      <mat-icon>print</mat-icon> Print Bill
    </button>
  </div>
</div>
