            <div class="p-15">

                                <th>Loi Number</th>

                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let item of loiDetails">
                                <th>
                                    <input type="radio" name="radAnswer" value='{{item.loiNumber}}'

                                </th>
                                <td>{{ item.loiNumber }}</td>
                                <td>{{ item.amount }}</td>
