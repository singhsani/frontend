		<mat-form-field class="col-md-4">
			<input matInput type="text" formControlName="buildingName" placeholder="{{'building_name' | translate: translateKey }}" >
			<control-messages [control]="addressFormGroup.controls.buildingName"></control-messages>
		</mat-form-field>

		<mat-form-field class="col-md-4">
			<input matInput type="text" formControlName="streetName" placeholder="{{'street_name' | translate: translateKey }}" >
			<control-messages [control]="addressFormGroup.controls.streetName"></control-messages>
		</mat-form-field>

		<mat-form-field class="col-md-4">
			<input matInput type="text" formControlName="landmark" placeholder="{{'landmark' | translate: translateKey }}" >
			<control-messages [control]="addressFormGroup.controls.landmark"></control-messages>
		</mat-form-field>

		<mat-form-field class="col-md-4">
			<input matInput type="text" formControlName="area" placeholder="{{'area' | translate: translateKey }}" >
			<control-messages [control]="addressFormGroup.controls.area"></control-messages>
		</mat-form-field>

		<mat-form-field class="col-md-4">
			<input matInput appValidationFields [validationFieldsType]="'onlyNameWithOutSpace'" formControlName="state" placeholder="{{'state' | translate: translateKey }}"  required>
			<control-messages [control]="addressFormGroup.controls.state"></control-messages>
		</mat-form-field>

		<mat-form-field class="col-md-4">
			<input matInput appValidationFields [validationFieldsType]="'onlyNameWithOutSpace'" formControlName="district" placeholder="{{'district' | translate: translateKey }}"  required>
			<control-messages [control]="addressFormGroup.controls.district"></control-messages>
		</mat-form-field>

		<mat-form-field class="col-md-4">
			<input matInput type="text" formControlName="city" placeholder="{{'city' | translate: translateKey }}"  required>
			<control-messages [control]="addressFormGroup.controls.city"></control-messages>
		</mat-form-field>

		<mat-form-field class="col-md-4">
			<input matInput type="text" formControlName="country" placeholder="{{'country' | translate: translateKey }}"  required >
			<control-messages [control]="addressFormGroup.controls.country"></control-messages>
		</mat-form-field>

		<mat-form-field class="col-md-4">
			<input matInput type="tel" OnlyNumber formControlName="pincode" placeholder="{{'pincode' | translate: translateKey }}" minlength="6" maxlength="6"  required>
			<control-messages [control]="addressFormGroup.controls.pincode"></control-messages>
		</mat-form-field>
