<div class="row mt-4">
	<div class="col-sm-12 col-md-12">

		<button *ngIf="step != 'step1'" mat-raised-button class="liteGrayBtn" matStepperPrevious>{{'back' | translate:translateKey}}</button>
		<button *ngIf="(isBtnsDisabled || !form.value.canEdit) && step !== 'final'" mat-raised-button color="primary" matStepperNext>{{'next' | translate:translateKey}}</button>

		<button mat-raised-button color="primary" [disabled]="isSaveBtnDisabled" *ngIf="isBtnsDisabled || form.value.canEdit" (click)="saveAsDraft()"
		 matStepperNext>{{step == 'final'? 'save' : 'save_and_next' | translate:translateKey}}</button>

		<ng-container *ngIf="step == 'final'">
			<button mat-raised-button color="success" [disabled]="isSubmitBtnDisabled" *ngIf="isBtnsDisabled || form.value.canEdit" (click)="onSubmit()">{{'submit' | translate:translateKey}}</button>
			<button mat-raised-button color="warn" *ngIf="isBtnsDisabled || form.value.canEdit" (click)="resetForm()">{{'reset' | translate:translateKey}}</button>
		</ng-container>
	</div>
