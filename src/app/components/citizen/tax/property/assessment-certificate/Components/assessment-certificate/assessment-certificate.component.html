<app-title-bar [title]="'Application for Assessment Certificate'"></app-title-bar>
<!-- <mat-card class="cardH1">
    <h1>Application for Assessment Certificate</h1>
</mat-card> -->

<mat-horizontal-stepper #stepper (selectionChange)="stepChanged($event, stepper);" class="stepperToTab">
    <mat-step>
        <ng-template matStepLabel>Applicant Details</ng-template>
        <app-applicant-detail-propertywater (stepChange)="stepChangedEvent($event)"
            (applicantDetails)="saveApplicantDetails($event)" [serviceType]="'PRO-ASSCER'">
        </app-applicant-detail-propertywater>
    </mat-step>
    <mat-step>
        <ng-template matStepLabel>Assessment Certificate Details</ng-template>
        <!-- Search Component Start -->
    <div *ngIf="!isShowForm">
        <app-assessment-certificate-search></app-assessment-certificate-search>
    </div>
    <!-- Form Component Start -->
    <div *ngIf="isShowForm">
        <app-payment></app-payment>
    </div>
    <!-- Form Component End -->
    <!-- Table Component Start -->
    <div [hidden]="!isShowTable">
        <app-assessment-certificate-table></app-assessment-certificate-table>
    </div>
    <!-- Table Component End -->
    </mat-step>
</mat-horizontal-stepper>




<div *ngIf="false">
    <!-- Search Component Start -->
    <div *ngIf="!isShowForm">
        <app-assessment-certificate-search></app-assessment-certificate-search>
    </div>
    <!-- Form Component Start -->
    <div *ngIf="isShowForm">
        <app-payment></app-payment>
    </div>
    <!-- Form Component End -->
    <!-- Table Component Start -->
    <div [hidden]="!isShowTable">
        <app-assessment-certificate-table></app-assessment-certificate-table>
    </div>
    <!-- Table Component End -->
</div>
<br>
