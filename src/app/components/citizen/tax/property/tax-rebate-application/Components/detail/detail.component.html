<mat-card class="col-md-12 mt-3">
  <div class="row">
    <div class="col-md-6">
      <div class="section-title">
        <h4>Details</h4>
      </div>
    </div>
    <div class="col-md-6 text-right">
      <button mat-raised-button class="ml-3" color="primary" type="button" (click)="cancelForm()">
        <mat-icon>skip_previous</mat-icon> Back
      </button>
    </div>
    <hr class="margin-top-10">
  </div>


<mat-horizontal-stepper #stepper class="stepperToTab">
<mat-step>
      <ng-template matStepLabel>Property Information</ng-template>
  <div class="row">
    <div class="col-md-12 mt-3">
      <form #formDetail="ngForm" (ngSubmit)="onSubmit(formDetail)">
        <!-- <div class="row">
          <div class="col-md-6">
            <mat-form-field class="full-width-input">
              <input disabled matInput placeholder="Census No">
            </mat-form-field>
          </div>
          <div class="col-md-6">
            <mat-form-field class="full-width-input">
              <input disabled matInput placeholder="Owner No">
            </mat-form-field>
          </div>
        </div>
        <div class="row">
          <div class="col-md-12">
            <mat-form-field class="full-width-input">
              <textarea disabled matInput placeholder="Address"></textarea>
            </mat-form-field>
          </div>
        </div> -->
        <div class="row">
          <div class="col-md-4">
            <div class="ngSelect">
              <ng-select required placeholder="Rebate Type *" [items]="rebateTypeList" bindValue="taxRebateId" (ngModelChange)="rebateTypeChange(rebateTypeList,$event)"
                bindLabel="taxRebateTypeName" name="taxRebateMstId" [(ngModel)]="model.taxRebateMstId" 
                #RebateTypeLookupId="ngModel"
                [ngClass]="{'ng-invalid ng-touched':  formDetail.submitted && RebateTypeLookupId.invalid}">
              </ng-select>
              <div
                *ngIf="(formDetail.submitted && RebateTypeLookupId.invalid)  || (RebateTypeLookupId.invalid && RebateTypeLookupId.touched)">
                <mat-error *ngIf="RebateTypeLookupId.errors.required">*Rebate Type is required.</mat-error>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <mat-form-field class="full-width-input">
              <input disabled matInput placeholder="Total Outstanding" name="totalOutstanding"
                [(ngModel)]="model.totalOutstanding">
            </mat-form-field>
          </div>
          <div class="col-md-4">
              <mat-form-field class="full-width-input" hidden>
                      <input matInput trim="blur" placeholder="Application Number" maxlength="20" #ApplicationNo="ngModel" name="applicationNo" [(ngModel)]="model.applicationNo">
                      <mat-error *ngIf="ApplicationNo.invalid">*Application No. is required.</mat-error>
              </mat-form-field>
      </div>
      <div class="col-md-4">
        <mat-form-field class="full-width-input" hidden>
                <input matInput trim="blur" placeholder="Application Number" maxlength="20" #ApplicationNo="ngModel" name="applicationNo" [(ngModel)]="model.taxRebateType">
                <mat-error *ngIf="ApplicationNo.invalid">*Application No. is required.</mat-error>
        </mat-form-field>
    </div>
        </div>
        <div class="row">
          <div class="col-md-12 text-right">
            <button class="ml-3" mat-raised-button color="primary" type="submit">
              <mat-icon>save</mat-icon> Save & Next
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</mat-step>

<mat-step>
  <ng-template matStepLabel>Applicant Details</ng-template>
  <app-applicant-detail-propertywater (stepChange)="stepChangedEvent($event)"
  (applicantDetails)="saveApplicantDetails($event)"
    [serviceType]="'PRO-TAX-REBATE'" [showSkipButton]="true"></app-applicant-detail-propertywater>
</mat-step>

<mat-step>
  <ng-template matStepLabel>Attachment</ng-template>
  <mat-card>
    <div class="row">
    <ng-container *ngFor="let doc of taxrebateDocumentUploadDocs">
      <div class="col-md-4">
        <label>{{doc.documentLabelEn}}<span *ngIf="doc.mandatory">*</span></label>
        <file-upload-water-tax [form]="taxrebateDocumentUploadDocs" [uploadModel]="doc"></file-upload-water-tax>
      </div>
      </ng-container>
    </div>

    <div class="row">
      <div class="button-row text-left mt-3 col-md-6">
        <button mat-raised-button class="ml-3" color="primary" (click)="onAttchmentBack()" type="button">
            <mat-icon>skip_previous</mat-icon>Back
        </button>
      </div>
      <div class="button-row text-right mt-3 col-md-6">
          <button mat-raised-button class="ml-3" color="primary" (click)="onSubmitApproved()" type="button">
              <mat-icon>save</mat-icon>Submit
          </button>
      </div>
    </div>

  </mat-card>
</mat-step>


  </mat-horizontal-stepper>

      <button mat-raised-button class="ml-3" color="primary" type="button" (click)="onApproved()">
        <mat-icon>approval</mat-icon>Approve
      </button>
    </div>
  </div> -->
</mat-card>
