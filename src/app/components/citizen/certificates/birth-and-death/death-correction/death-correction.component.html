<app-title-bar [title]="'screen_title' | translate: translateKey"></app-title-bar>
<mat-card *ngIf="showApplicationSearch">
    <form [formGroup]="regStatusForm" (ngSubmit)="getRegistrationNumberStatus()" autocomplete="off">

        <div class="row">
            <mat-form-field class="col-md-4">
                <input matInput maxlength="25" placeholder="{{'registration_number' | translate:translateKey}}"
                    formControlName="registrationNumber" required>
                <control-messages [control]="regStatusForm.get('registrationNumber')"></control-messages>
            </mat-form-field>

            <div formGroupName="typeOfCorrection" class="col-md-6 ngSelect">
                <ng-select placeholder="{{'type_of_correction' | translate:translateKey}}" formControlName="code">
                    <ng-option *ngFor="let type of TypeOfCorrection" [value]="type.code">
                        {{type.name}}
                    </ng-option>
                </ng-select>
                <control-messages [control]="regStatusForm.get('typeOfCorrection').get('code')"></control-messages>
            </div>

            <div class="col-md-2 text-right">
                <button [disabled]="!regStatusForm.valid" mat-stroked-button color="primary" class="w-100 mt-2" type="submit">
                    {{'search' | translate:translateKey}}
                </button>
            </div>

         

            <!-- <div class="col-md-2 text-right">
                <button *ngIf="regStatusForm.valid" mat-raised-button color="primary" type="submit">{{'search' | translate:
                        translateKey}}</button>
            </div> -->
        </div>
    </form>
</mat-card>

<mat-card [hidden]="!showcorrectionForm" class="formClass cardBorder">
    <form [formGroup]="deathCorrectionForm" autocomplete="off">
        <mat-tab-group mat-stretch-tabs [(selectedIndex)]="tabIndex" class="stepperNav" dynamicHeight="true">

            <mat-tab [label]="'deceased_details' | translate: translateKey">

                <div class="row">
                    <mat-form-field class="col-md-4">
                        <input matInput appValidationFields [form]="deathCorrectionForm" appGujInputSource
                            targetElement="deceasedFirstNameGuj" [validationFieldsType]="'onlyNameWithOutSpace'"
                            maxlength="20" placeholder="{{'first_name' | translate:translateKey}}"
                            formControlName="deceasedFirstName" required>
                        <control-messages [control]="deathCorrectionForm.get('deceasedFirstName')"></control-messages>
                    </mat-form-field>
                    <mat-form-field class="col-md-4">
                        <input matInput appValidationFields [form]="deathCorrectionForm" appGujInputSource
                            targetElement="deceasedMiddleNameGuj" [validationFieldsType]="'onlyNameWithOutSpace'"
                            maxlength="20" placeholder="{{'middle_name' | translate:translateKey}}"
                            formControlName="deceasedMiddleName">
                        <control-messages [control]="deathCorrectionForm.get('deceasedMiddleName')"></control-messages>
                    </mat-form-field>
                    <mat-form-field class="col-md-4">
                        <input matInput appValidationFields [form]="deathCorrectionForm" appGujInputSource
                            targetElement="deceasedLastNameGuj" [validationFieldsType]="'onlyNameWithOutSpace'"
                            maxlength="20" placeholder="{{'last_name' | translate:translateKey}}"
                            formControlName="deceasedLastName" required>
                        <control-messages [control]="deathCorrectionForm.get('deceasedLastName')"></control-messages>
                    </mat-form-field>
                    <mat-form-field class="col-md-4">
                        <input required matInput maxlength="20" appGujInputTarget [form]="deathCorrectionForm"
                            placeholder="{{'first_name' | translate:translateKey:'gu'}}"
                            formControlName="deceasedFirstNameGuj">
                        <control-messages [control]="deathCorrectionForm.get('deceasedFirstNameGuj')">
                        </control-messages>
                    </mat-form-field>
                    <mat-form-field class="col-md-4">
                        <input matInput type="text" appGujInputTarget [form]="deathCorrectionForm" maxlength="20"
                            placeholder="{{'middle_name' | translate:translateKey:'gu'}}"
                            formControlName="deceasedMiddleNameGuj">
                        <control-messages [control]="deathCorrectionForm.get('deceasedMiddleNameGuj')">
                        </control-messages>
                    </mat-form-field>
                    <mat-form-field class="col-md-4">
                        <input required matInput type="text" appGujInputTarget [form]="deathCorrectionForm"
                            maxlength="20" placeholder="{{'last_name' | translate:translateKey:'gu'}}"
                            formControlName="deceasedLastNameGuj">
                        <control-messages [control]="deathCorrectionForm.get('deceasedLastNameGuj')"></control-messages>
                    </mat-form-field>

                    <mat-form-field class="col-md-4">
                        <input matInput trim type="text" formControlName="motherName"
                            placeholder="{{'mother_name' | translate: translateKey}}" readonly>
                    </mat-form-field>

                    <mat-form-field class="col-md-4">
                        <input matInput trim type="text" appGujInputTarget [form]="deathCorrectionForm" formControlName="motherNameGuj"
                            placeholder="{{'mother_name' | translate: translateKey: 'gu'}}" readonly>
                    </mat-form-field>
                </div>

                <app-action-bar [uploadFiles]="uploadFileArray" [form]="deathCorrectionForm"
                    [stepInfo]="{step: 'step0', next: 1, back: 0}" (handleErrors)="handleErrorsOnSubmit($event)"
                    (tabIndex)="onTabChange($event)"></app-action-bar>

            <mat-tab [label]="'upload_documents' | translate: translateKey">

                <div class="alert alert-warning">
                    {{'note' | translate:translateKey}}

                </div>
                <div class="alert alert-warning">
                    {{'note' | translate:translateKey}} : {{'file_size_less_than_5_mb' | translate:translateKey}}
                </div>
<!-- dynamic documents -->
                <div class="row">
                    <ng-container
                        *ngFor="let doc of deathCorrectionForm.get('serviceDetail').get('serviceUploadDocuments').value">
                        <div class="col-md-4"
                            *ngIf="doc.requiredOnCitizenPortal && doc.isActive && showButtons">
                            <label>{{TranslateService.getCurrentLanguage()=='en'? doc.documentLabelEn : doc.documentLabelGuj }}
                                <span *ngIf="doc.mandatory">*</span></label>
                            <file-upload [form]="deathCorrectionForm" [uploadModel]="doc"></file-upload>
                        </div>
                    </ng-container>
