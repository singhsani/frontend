<mat-card>
  <div class="row">
    <div class="col-md-6">
      <h5>Collection Tax Wise Detail</h5>
    </div>
    <!-- <div class="col-md-6 text-right">
      <button mat-raised-button color="primary" type="button" (click)="cancelForm()">
        <mat-icon>skip_previous</mat-icon> Back
      </button>
    </div> -->
    <hr>
  </div>
  <div class="row">
    <div class="col-md-12">
      <table mat-table [dataSource]="dataSource">
        <ng-container matColumnDef="taxName">
          <th mat-header-cell *matHeaderCellDef>Tax Name </th>
          <td mat-cell *matCellDef="let element"> {{element.taxName}} </td>
          <td mat-footer-cell *matFooterCellDef> Total</td>
        </ng-container>
        <ng-container matColumnDef="billAmount">
          <th mat-header-cell *matHeaderCellDef> Bill Amount</th>
          <td mat-cell *matCellDef="let element"> {{element.billAmount}} </td>
          <td mat-footer-cell *matFooterCellDef> {{totalBillAmount}} </td>
        </ng-container>
        <ng-container matColumnDef="paidAmount">
          <th mat-header-cell *matHeaderCellDef> Paid Amount</th>
          <td mat-cell *matCellDef="let element"> {{element.paidAmount}} </td>
          <td mat-footer-cell *matFooterCellDef> {{totalPaidAmount}} </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr mat-footer-row *matFooterRowDef="displayedColumns"></tr>
      </table>
    </div>
  </div>


  <br>
  <!-- <div></div> -->
<div class="col-md-6 text-left">
      <button mat-raised-button color="primary" type="button" (click)="cancelForm()">
        <mat-icon>skip_previous</mat-icon> Back
      </button>
    </div>
</mat-card>
