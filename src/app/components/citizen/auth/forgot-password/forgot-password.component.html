<div class="example-container col-md-6 col-md-offset-3" style="margin-top: 40px;">
	<div class="header">
		<div class="heading">Fogot Password</div>
	</div>
	<mat-card>
		<mat-card-content>
			<form [formGroup]="forgotPassForm" (ngSubmit)="onForgotPassword(forgotPassForm.value)" autocomplete="off" ngNativeValidate>

				<mat-form-field class="example-full-width" style="width:100%">
					<input matInput type="email" placeholder="Email" formControlName="email" required>
				</mat-form-field>

				<mat-form-field class="example-full-width" style="width:100%">
					<input matInput type="number" placeholder="Cell Number" formControlName="cellNo" required>
				</mat-form-field>

				<button type="submit" mat-raised-button color="primary" [disabled]="forgotPassForm.invalid" style="width:100%">
					Submit
				</button>

				<button type="button" mat-raised-button color="primary" style="width:100%;margin-top: 10px;" routerLink="../login">
					Back to Login
				</button>
			</form>
		</mat-card-content>
	</mat-card>
</div>
