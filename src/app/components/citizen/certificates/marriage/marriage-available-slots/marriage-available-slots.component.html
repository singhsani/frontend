<div class="container">
  <div class="example-container mat-elevation-z8">
      <table mat-table [dataSource]="slotDataSource" class="scrollModel">

        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let row">{{ row.start | date : 'dd/MM/yyyy' }}</td>
        </ng-container>

        <ng-container matColumnDef="end time">
          <th mat-header-cell *matHeaderCellDef>End Time</th>
          <td mat-cell *matCellDef="let row">{{ row.end | date:'hh:mm a'}}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Slot Status</th>
          <td mat-cell *matCellDef="let row">{{ row.slotStatus }}</td>
        </ng-container>

        <!-- <ng-container matColumnDef="action">
              <th mat-header-cell *matHeaderCellDef>Action</th>
              <td mat-cell *matCellDef="let row">
                <button mat-icon-button color="primary" *ngIf="row.slotStatus === 'AVAILABLE'"
                  (click)="redirectToBook(row)">
                  <mat-icon matTooltip="Book Appointment">touch_app</mat-icon>
                </button>
                <button mat-icon-button color="primary" *ngIf="row.slotStatus === 'BOOKED'">
                  <mat-icon matTooltip="Booked">done</mat-icon>
                </button>
              </td>
            </ng-container> -->

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" [hidden]="row.slotStatus === 'BOOKED'"></tr>

      </table>
  </div>
</div>
<mat-paginator showFirstLastButtons [hidden]="resultsLength==0" [pageSizeOptions]="[5, 10, 25]"
  [length]="resultsLength">
</mat-paginator>
<div class="norecord" *ngIf="resultsLength==0"> {{'no_record_found' | translate: translateKey }}
</div>
