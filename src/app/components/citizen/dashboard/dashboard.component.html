<div class="container">
    <div *ngFor="let module of userServicesList">
            <app-title-bar [title]="module.name +' / '+ module.gujName"></app-title-bar>
        <div class="row">
        <div class="col-md-4 pb-4 text-center" *ngFor="let service of module.services;">
            <mat-card>
                <mat-icon>account_circle</mat-icon>
                <mat-card-title>{{service.name +' / '+ service.gujName}}</mat-card-title>
                <mat-card-actions>
                    <button mat-raised-button color="primary" (click)="createRecord(service.code)">
                        <mat-icon>input</mat-icon> New Application
                    </button>
                </mat-card-actions>
            </mat-card>
        </div>
        </div>
    </div>
</div>
