	<app-title-bar [title]="'screen_title' | translate: translateKey"></app-title-bar>

	<mat-card [hidden]="serachLicenceObj.isDisplayCancelLicenceForm" class="mt-4 formClass">
		<mat-form-field class="col-md-10">
			<input matInput required placeholder="{{'search_by_application_no' | translate:translateKey}}" [(ngModel)]="serachLicenceObj.searchLicenceNumber">
		</mat-form-field>
		<button class="col-md-2" [disabled]="!serachLicenceObj.searchLicenceNumber" mat-raised-button color="primary" (click)="searchLicence()">{{'search' | translate:translateKey}}</button>
	</mat-card>

	<mat-card [hidden]="!serachLicenceObj.isDisplayCancelLicenceForm" class="formClass cardBorder">
		<form [formGroup]="shopCancellationForm">
			<mat-tab-group [(selectedIndex)]="tabIndex" dynamicHeight="true" mat-stretch-tabs class="stepperNav">

				<!-- step 1 Starts -->
				<mat-tab>
					<ng-template mat-tab-label>
						<div>{{'establishment_details' | translate:translateKey}}</div>
					</ng-template>

					<div class="row">
						<mat-form-field class="col-md-4">
							<input matInput readonly required placeholder="{{'license_no' | translate:translateKey}}" formControlName="refNumber">
							<control-messages [control]="shopCancellationForm.controls.refNumber"></control-messages>
						</mat-form-field>
						<mat-form-field class="col-md-4">
							<input matInput readonly placeholder="{{'issue_date' | translate:translateKey}}" formControlName="licenseIssueDate">
							<control-messages [control]="shopCancellationForm.controls.licenseIssueDate"></control-messages>
						</mat-form-field>
					</div>
					<div class="row">
						<mat-form-field class="col-md-4">
							<input matInput required maxlength="150" placeholder="{{'name_of_establishment_if_any' | translate:translateKey}}" formControlName="establishmentName">
							<control-messages [control]="shopCancellationForm.controls.establishmentName"></control-messages>
						</mat-form-field>
						<!-- appGujInputSource targetElement="establishmentNameGuj" [form]="shopCancellationForm" -->
						<!-- gujarati -->
						<!-- <mat-form-field class="col-md-6">
							<input matInput type="text" required formControlName="establishmentNameGuj" appGujInputTarget [form]="shopCancellationForm"
							 placeholder="{{ 'name_of_establishment_if_any' | translate:translateKey:'gu' }}">
							<control-messages [control]="shopCancellationForm.controls.establishmentNameGuj"></control-messages>
						</mat-form-field> -->
						<!-- /gujarati -->

						<div class="col-md-12">{{'postal_address_of_establishment' | translate:translateKey}}
							<app-address #postalAddressEstablishment [addressFormGroup]="shopCancellationForm.controls.postalAddress"></app-address>
						</div>

						<div class="col-md-4 ngSelect" formGroupName="wardNo">
							<ng-select placeholder="{{'ward_no' | translate:translateKey}} *" formControlName="code" required>
								<ng-option *ngFor="let no of wardNo" [value]="no.code">{{no.name}}</ng-option>
							</ng-select>
							<control-messages [control]="shopCancellationForm.controls.wardNo.controls.code"></control-messages>
						</div>

						<mat-form-field class="col-md-4">
							<input matInput required maxlength="100" placeholder="{{'name_of_employer' | translate:translateKey}}" formControlName="nameOfEmployer">
							<control-messages [control]="shopCancellationForm.controls.nameOfEmployer"></control-messages>
						</mat-form-field>
						<!-- appGujInputSource targetElement="nameOfEmployerGuj" [form]="shopCancellationForm" -->
						<!-- gujarati -->
						<!-- <mat-form-field class="col-md-6">
							<input matInput type="text" required formControlName="nameOfEmployerGuj" appGujInputTarget [form]="shopCancellationForm" placeholder="{{ 'name_of_employer' | translate:translateKey:'gu' }}">
							<control-messages [control]="shopCancellationForm.controls.nameOfEmployerGuj"></control-messages>
						</mat-form-field> -->

						<mat-form-field class="col-md-4">
							<input matInput required maxlength="13" minlength="13" appAlphaNumeric placeholder="{{'business_property_tax_no' | translate:translateKey}}" formControlName="propertyTaxNo">
							<control-messages [control]="shopCancellationForm.controls.propertyTaxNo"></control-messages>
						</mat-form-field>

						<mat-form-field class="col-md-4">
							<input matInput required maxlength="100" type="textarea" placeholder="{{'remark' | translate:translateKey}}" formControlName="remark">
							<control-messages [control]="shopCancellationForm.controls.remark"></control-messages>
						</mat-form-field>
					</div>

					<app-action-bar [uploadFiles]="uploadFileArray" [form]="shopCancellationForm" [stepInfo]="{step: 'final', next: 1, back: 0}"
					 (handleErrors)="handleErrorsOnSubmit($event)"></app-action-bar>
				</mat-tab>
				<!-- step 1 Ends -->

			</mat-tab-group>
		</form>
	</mat-card>
