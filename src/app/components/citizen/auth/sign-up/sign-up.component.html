<mat-card class="borderRadius10 signUp">
	<div class="headingBox">Registration
		<span>Sign up by entering the information below</span>
	</div>
	<form [formGroup]="regForm" (ngSubmit)="onSignUp(regForm.value)" autocomplete="off" novalidate>
		<div class="row">
			<mat-form-field class="iconMat col-md-6">
				<mat-icon matPrefix>face</mat-icon>
				<input matInput type="text" placeholder="Firstname" appValidationFields validationFieldsType="onlyNameWithOutSpace" formControlName="firstName"
				 required #firstname="matInput" maxlength="50">
				<control-messages [control]="regForm.get('firstName')"></control-messages>
			</mat-form-field>

			<mat-form-field class="iconMat col-md-6">
				<mat-icon matPrefix>face</mat-icon>
				<input matInput type="text" placeholder="Lastname" appValidationFields validationFieldsType="onlyNameWithOutSpace" formControlName="lastName"
				 required maxlength="50">
				<control-messages [control]="regForm.get('lastName')"></control-messages>
			</mat-form-field>

			<mat-form-field class="iconMat col-md-6">
				<mat-icon matPrefix>mail_outline</mat-icon>
				<input matInput type="email" placeholder="Email" appPreventSpace formControlName="email" required maxlength="50">
				<control-messages [control]="regForm.get('email')"></control-messages>
			</mat-form-field>

			<mat-form-field class="iconMat col-md-6">
				<mat-icon matPrefix>phone_android</mat-icon>
				<input matInput type="tel" OnlyNumber placeholder="Mobile Number" formControlName="cellNo" minlength="10" maxlength="10" required>
				<control-messages [control]="regForm.get('cellNo')"></control-messages>
			</mat-form-field>

			<mat-form-field class="iconMat col-md-6">
				<mat-icon matPrefix>lock_outline</mat-icon>
				<input matInput type="password" placeholder="Password" formControlName="password" required maxlength="50">
				<control-messages [control]="regForm.get('password')"></control-messages>
			</mat-form-field>

			<mat-form-field class="iconMat col-md-6">
				<mat-icon matPrefix>lock_outline</mat-icon>
				<input matInput type="password" placeholder="Confirm Password" formControlName="confirmPassword" required maxlength="50">
				<control-messages [control]="regForm.get('confirmPassword')"></control-messages>
			</mat-form-field>

			<div class="col-md-6 offset-md-6">
				<mat-error *ngIf="regForm.errors && regForm.errors['mismatchedPasswords']">Password not match</mat-error>
			</div>
		</div>

		<div class="text-center pt-1">
			<button type="submit" mat-raised-button color="primary" [disabled]="issingupbtn" [disabled]="regForm.invalid" class="width150">
				Sign up  &nbsp;
                <img *ngIf="loading" [class.disabled]="loading" src="assets/images/loader.gif" />
			</button>
		</div>
		<div class="text-center pt-2">
			Already have an account ?
			<a routerLink="/{{manageRoutes.getFullRoute('CITIZENAUTHLOGIN')}}">
				<strong>Login</strong>
			</a> here.
		</div>
	</form>

</mat-card>
