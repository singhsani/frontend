<div class="example-container">

    <mat-toolbar color="primary" class="example-toolbar">
        <mat-toolbar-row class="dasHeader">
         <div class="float-left">
            <button mat-icon-button (click)="snav && snav.toggle()">
                <mat-icon>menu</mat-icon>
            </button>
            <a mat-button routerLink="." class="logo">
                <img src="assets/images/vmc-logo.png" alt="Vadodara Municipal Corporation"> Vadodara Municipal Corporation</a>
            <span class="example-spacer"></span>
         </div>
            <!-- <button mat-icon-button position="end" (click)="selectLanguage('en')">EN</button>
            <button mat-icon-button position="end" (click)="selectLanguage('gu')">ગુજ</button> -->
            <div class="float-right">
            <button mat-icon-button  [matMenuTriggerFor]="menu" class="userName">
                <mat-icon>account_circle</mat-icon>
                    {{profileObj.firstName + ' ' + profileObj.lastName}}
                <mat-icon>arrow_drop_down</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
                <button mat-menu-item routerLink="/citizen/my-profile">Profile</button>
                <button mat-menu-item (click)="onLogout()">Logout</button>
            </mat-menu>
        </div>
        </mat-toolbar-row>
    </mat-toolbar>

    <mat-sidenav-container class="example-sidenav-container">
        <mat-sidenav #snav [mode]="mobileQuery.matches ? 'over' : 'side'" [(opened)]="!mobileQuery.matches">
            <mat-nav-list (click)="toggleSideNav()">
                <a mat-list-item routerLink="/citizen/dashboard/" routerLinkActive="active-route-link">Dashboard</a>
                <a mat-list-item routerLink="/citizen/my-applications/" routerLinkActive="active-route-link">My Applications</a>
                <a mat-list-item routerLink="/citizen/my-profile" routerLinkActive="active-route-link">My Profile</a>
                <a mat-list-item routerLink="/citizen/my-resource" routerLinkActive="active-route-link">Resource</a>
                <a mat-list-item routerLink="/citizen/my-transactions" routerLinkActive="active-route-link">Transactions</a>
                <a mat-list-item routerLink="/citizen/booking" routerLinkActive="active-route-link" [routerLinkActiveOptions]="{exact: true}">Booking</a>
                <a mat-list-item routerLink="/citizen/booking/cancel-booking" routerLinkActive="active-route-link" [routerLinkActiveOptions]="{exact: true}">Cancel Booking</a>
            </mat-nav-list>
        </mat-sidenav>
        <mat-sidenav-content>
            <loading-indicator></loading-indicator>
            <router-outlet></router-outlet>
        </mat-sidenav-content>
    </mat-sidenav-container>
</div>
