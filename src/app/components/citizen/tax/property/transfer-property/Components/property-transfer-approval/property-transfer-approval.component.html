<mat-card *ngIf="!isApprovedOrDecline">
    <div class="button-row text-center mt-3">
        <button mat-raised-button class="ml-3" color="primary" type="button" (click)="onBack()">
            <mat-icon>skip_previous</mat-icon>Back
        </button>
        <button mat-raised-button class="ml-3" color="warn" type="button" (click)="onDecline()">
            <mat-icon>cancel_presentation</mat-icon>Decline
        </button>
        <button mat-raised-button class="ml-3" color="primary" type="button" (click)="onApproved()">
            <mat-icon>approval</mat-icon>Approve Now
        </button>
    </div>
</mat-card>

<mat-card class="mt-3" *ngIf="modelFileDownload.length>0 && isApprovedOrDecline">
    <div class="row">
        <div class="col-md-12">
            <div class="section-title">
                <h4>Downloads</h4>
                <mat-divider></mat-divider>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
            <button mat-stroked-button class="ml-3 mt-3" type="button" color="primary" *ngFor="let item of modelFileDownload"
                (click)="downloadFile(item)">
                <mat-icon>arrow_downward</mat-icon>{{item.displayName}}
            </button>
        </div>
    </div>
</mat-card>
