<div class="custom-chart">
  <canvas baseChart height="120" width="120" class="alignChart" [options] ="pieChartOptions"
          [legend] ="isLegentRequired"
          [data]="pieChartDataSet"
          [colors]="pieChartColors"
          [labels]="pieChartLabels"
          [chartType]="pieChartType">
  </canvas>
</div>
