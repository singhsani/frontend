<mat-card class="mt-4">
  <div class="row">
    <div class="col-md-12">
      <div class="section-title">
        <h4>Property History</h4>
        <mat-divider></mat-divider>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-12">
      <table mat-table [dataSource]="dataSource" matSort class="width100">
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Date </th>
          <td mat-cell *matCellDef="let element"> {{element.date}} </td>
        </ng-container>
        <ng-container matColumnDef="transactionType">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Transaction Type </th>
          <td mat-cell *matCellDef="let element"> {{element.transactionType}} </td>
        </ng-container>
        <ng-container matColumnDef="applicationNo">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Application No./Order No. </th>
          <td mat-cell *matCellDef="let element"> {{element.applicationNo}} </td>
        </ng-container>
        <ng-container matColumnDef="approvalDate">  
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Approval Date </th>
          <td mat-cell *matCellDef="let element"> {{element.approvalDate}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      
    </div>
  </div>
</mat-card>
<div class="row mt-3" style="display:none;">
  <div class="col-md-12 text-right">
    <button mat-raised-button color="primary" type="button" (click)="onPrint()">
      <mat-icon>print</mat-icon> Print
    </button>
  </div>
</div>
