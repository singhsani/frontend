<mat-horizontal-stepper #stepper class="stepperToTab">
    <mat-step>
        <ng-template matStepLabel>Applicant Details</ng-template>
        <app-applicant-detail-propertywater (stepChange)="stepChangedEvent($event)"
            (applicantDetails)="saveApplicantDetails($event)" [serviceType]="'WTR-TRXF-OWN'">
        </app-applicant-detail-propertywater>
    </mat-step>
    <mat-step>
        <ng-template matStepLabel>Detail</ng-template>
        <mat-card>
            <div class="row">
                <div class="col-md-6">
                    <mat-form-field class="full-width-input" hidden>
                    <input matInput trim="blur"  placeholder="Application No" maxlength="20" #ApplicationNo="ngModel" name="applicationNumber" [(ngModel)]="applicationModel.applicationNumber">
                    <mat-error *ngIf="ApplicationNo.invalid">*Application No is required.</mat-error>
                    </mat-form-field>
                </div>
            </div>
        </mat-card>
        <mat-card class="mt-3">
            <div class="row">
                <div class="col-md-4">
                    <mat-form-field class="full-width-input">
                        <input trim="blur" matInput placeholder="Connection Number" maxlength="50" name="connectioNo" [(ngModel)]="connectioNo">
                    </mat-form-field>
                </div>
                <div class="col-md-2">
                    <button mat-raised-button color="primary" type="button" (click)="searchByConnectionNo()"> Go </button>
                </div>
                <div class="col-md-6">
                    <mat-form-field class="full-width-input">
                        <input disabled matInput placeholder="Owner Name" name="ownerName" [(ngModel)]="connectionsModel.connectionDetail.ownerName">
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <mat-form-field class="full-width-input">
                        <textarea disabled matInput placeholder="Address" name="address" [(ngModel)]="connectionsModel.address"></textarea>
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <mat-form-field class="full-width-input">
                        <input disabled matInput placeholder="Property Dues" name="propertyDues" [(ngModel)]="connectionsModel.propertyDues">
                    </mat-form-field>
                </div>
                <div class="col-md-2">
                    <button *ngIf="isShowSaveButton" class="ml-3" mat-raised-button color="accent" type="button" (click)="onPropertyDetailClick()">
                        <mat-icon>details</mat-icon> Detail
                    </button>
                </div>
                <div class="col-md-4">
                    <mat-form-field class="full-width-input">
                        <input disabled matInput placeholder="Water Dues" name="waterDues" [(ngModel)]="connectionsModel.waterDues">
                    </mat-form-field>
                </div>
                <div class="col-md-2">
                    <button  *ngIf="isShowSaveButton" class="ml-3" mat-raised-button color="accent" type="button" (click)="onWaterDetailClick()">
                        <mat-icon>details</mat-icon> Detail
                    </button>
                </div>
            </div>
            <form #form="ngForm" (ngSubmit)="save(form)">
                <div class="row">
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input trim="blur" matInput maxlength="255" placeholder="New Owner Name" required #NewOwnerName="ngModel" name="newOwnerName"
                                [(ngModel)]="dataModel.newOwnerName">
                            <mat-error *ngIf="NewOwnerName.invalid">*New Owner Name is required.</mat-error>
                        </mat-form-field>
                    </div>
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input matInput maxlength="10" minlength="10" number-only placeholder="Mobile Number" required #MobileNo="ngModel"
                                name="mobileNo" [(ngModel)]="dataModel.mobileNo" (keypress)="numberOnly($event)">
                            <mat-error *ngIf="MobileNo.invalid">*Mobile Number is invalid.</mat-error>
                        </mat-form-field>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input matInput maxlength="12" minlength="12" number-only placeholder="Aadhaar Number*"  #AadharNo="ngModel" (keypress)="numberOnly($event)"
                                name="aadharNo" [(ngModel)]="dataModel.aadharNo">
                            <mat-error *ngIf="AadharNo.invalid">Aadhaar Number is invalid.</mat-error>
                        </mat-form-field>
                    </div>
                    <div class="col-md-6">
                        <div class="ngSelect">
                            <ng-select required placeholder="Reason for Transfer *" [items]="reasonList" bindValue="itemId" bindLabel="itemName"
                                name="reasonForTransferId" [(ngModel)]="dataModel.reasonForTransferId" #ReasonForTransferId="ngModel"
                                [ngClass]="{'ng-invalid ng-touched':  form.submitted && ReasonForTransferId.invalid}">
                            </ng-select>
                            <div *ngIf="(form.submitted && ReasonForTransferId.invalid)  || (ReasonForTransferId.invalid && ReasonForTransferId.touched)">
                                <mat-error *ngIf="ReasonForTransferId.errors.required">*Reason for Transfer is required.</mat-error>
                            </div>                    
                        </div>

                    </div>
                </div>
                <div class="col-sm-12 col-md-12 p-4 mt-3" *ngIf="isShowSaveButton">
                    <button mat-raised-button class="ml-3 pull-left" color="primary" type="button" (click)="moveStepper(0)">
                        <mat-icon>skip_previous</mat-icon>Back
                    </button>

                    <button class="ml-3 pull-right" mat-raised-button color="primary" type="submit">
                        <mat-icon>save</mat-icon> Save & Next
                    </button>
                    <button class="ml-3 pull-right" mat-raised-button color="warn" type="button" (click)="clear(form)">
                        <mat-icon>clear_all</mat-icon> Clear
                    </button>
                </div>
            </form>
        </mat-card>
    </mat-step>
    <mat-step>
        <ng-template matStepLabel>Attachment</ng-template>
        <mat-card>
            <div class="row">
                <ng-container *ngFor="let doc of applictionTrasferOwnDocumentUploadDocs">
                    <div class="col-md-4">
                        <label>{{doc.documentLabelEn}}<span *ngIf="doc.mandatory">*</span></label>
                        <file-upload-water-tax [form]="applictionTrasferOwnDocumentUploadDocs" [uploadModel]="doc"></file-upload-water-tax>
                    </div>
                </ng-container>
            </div>
            <div class="col-sm-12 col-md-12 p-4 mt-3">
                <button mat-raised-button class="ml-3 pull-left" color="primary" type="button" (click)="moveStepper(1)">
                    <mat-icon>skip_previous</mat-icon>Back
                </button>
                <button mat-raised-button class="ml-3 pull-right" color="primary" type="button" (click)="onSubmitApproved()">
                    <mat-icon>save</mat-icon>Submit
                </button>
            </div>
        </mat-card> 
    </mat-step>
</mat-horizontal-stepper>
