	<app-title-bar [title]="'screen_title' | translate: translateKey">
	</app-title-bar>
	<mat-card class="cardBorder">
		<form [formGroup]="marriageDuplicateForm" (ngSubmit)="getApplicationDetails()" autocomplete="off">
			<!-- <mat-tab-group [(selectedIndex)]="tabIndex"  [(selectedIndex)]="tabIndex"  class="stepperNav" dynamicHeight='true' mat-stretch-tabs> -->

				<!-- first step start-->
				<!-- <mat-tab [label]="stepLable1">
					<app-basic-details [basicFormGroup]="marriageDuplicateForm"></app-basic-details>

					<div class="col-12">
						<app-action-bar [form]="marriageDuplicateForm" [stepInfo]="{step: 'step1', next: 1, back: 0}"  (tabIndex)="onTabChange($event)"></app-action-bar>
					</div>

				</mat-tab> -->

				<!-- second step start-->
				<!-- <mat-tab [label]="stepLable2"> -->
					<div class="row">

						<mat-form-field class="col-4">
							<input matInput type="text" formControlName="marriageRegNumber" placeholder="{{ 'marriage_reg_number' | translate:translateKey }}"
							 required>
							<control-messages [control]="marriageDuplicateForm.controls.marriageRegNumber"></control-messages>
						</mat-form-field>

						<mat-form-field class="col-4">
							<input matInput [max]="disablefutureDate" [matDatepicker]="picker1" formControlName="marriageDate" (dateChange)="dateFormate($event.value,'marriageDate')"
							 placeholder="{{ 'date_of_marriage' | translate:translateKey }}" required>
							<mat-datepicker-toggle matSuffix [for]="picker1"></mat-datepicker-toggle>
							<mat-datepicker #picker1></mat-datepicker>
							<control-messages [control]="marriageDuplicateForm.controls.marriageDate"></control-messages>
						</mat-form-field>

						<mat-form-field class="col-4">
							<input matInput [min]="marriageDuplicateForm.controls.marriageDate.value" [max]="disablefutureDate" [matDatepicker]="marriageRegDatepicker" formControlName="marriageRegDate" (dateChange)="dateFormate($event.value,'marriageRegDate')"
							 placeholder="{{ 'marriage_reg_date' | translate:translateKey }}" required>
							<mat-datepicker-toggle matSuffix [for]="marriageRegDatepicker"></mat-datepicker-toggle>
							<mat-datepicker #marriageRegDatepicker></mat-datepicker>
							<control-messages [control]="marriageDuplicateForm.controls.marriageRegDate"></control-messages>
						</mat-form-field>

						<mat-form-field class="col-4">
							<input matInput type="text" formControlName="marriageRegYear" placeholder="{{ 'marriage_reg_year' | translate:translateKey }}"
							 required>
							<control-messages [control]="marriageDuplicateForm.controls.marriageRegYear"></control-messages>
						</mat-form-field>

						<mat-form-field class="col-4">
							<input matInput type="text" formControlName="groomName" placeholder="{{ 'groom_name' | translate:translateKey }}" required>
							<control-messages [control]="marriageDuplicateForm.controls.groomName"></control-messages>
						</mat-form-field>

						<mat-form-field class="col-4">
							<input matInput type="text" formControlName="brideName" placeholder="{{ 'bride_name' | translate:translateKey }}" required>
							<control-messages [control]="marriageDuplicateForm.controls.brideName"></control-messages>
						</mat-form-field>

						

						<!-- <div class="col-12">
							<app-action-bar [form]="marriageDuplicateForm" [stepInfo]="{step: 'final', next: 1, back: 0}" (tabIndex)="onTabChange($event)" (handleErrors)="handleErrorsOnSubmit($event)"></app-action-bar>
						</div> -->
						
					</div>
					<div class="row fotButtonBar">
						<div class="col-sm-12 col-md-12 text-right">
							<button mat-raised-button color="primary" type="submit">
								{{'search'| translate: translateKey}}
							</button>
						</div>
					</div>
				<!-- </mat-tab>
			</mat-tab-group> -->
		</form>
	</mat-card>

	<!-- Table start-->
	<div class="example-container mat-elevation-z8" [hidden]="resultsLength == 0">
		
		<table mat-table #table [dataSource]="dataSource" class="example-table" matSort matSortActive="created" matSortDisableClear
		 matSortDirection="asc">
	
			<ng-container matColumnDef="id">
				<th mat-header-cell *matHeaderCellDef>#</th>
				<td mat-cell *matCellDef="let row; let i = index;">{{ paginator.pageIndex==0?i+1:((paginator.pageIndex+1)*10)+(i+1) }}</td>
			</ng-container>
	
			<ng-container matColumnDef="seq">
				<th mat-header-cell *matHeaderCellDef></th>
				<td mat-cell *matCellDef="let row;let i = index;">
					<mat-checkbox [checked]="selected === i" (change)="onChkBoxClick($event,row);selected = i"></mat-checkbox>
				</td>
			</ng-container>
	
			<ng-container matColumnDef="applicantName">
				<th mat-header-cell *matHeaderCellDef>Applicant Name</th>
				<td mat-cell *matCellDef="let row">{{ row.applicantName }}</td>
			</ng-container>
	
			<ng-container matColumnDef="fileNumber">
				<th mat-header-cell *matHeaderCellDef>File Number</th>
				<td mat-cell *matCellDef="let row">{{ row.fileNumber }}</td>
			</ng-container>
	
			<ng-container matColumnDef="serviceType">
				<th mat-header-cell *matHeaderCellDef>Service Name</th>
				<td mat-cell *matCellDef="let row">{{ row.serviceDetail.name }}</td>
			</ng-container>
	
			<ng-container matColumnDef="action">
				<th mat-header-cell *matHeaderCellDef>Action</th>
				<td mat-cell *matCellDef="let row">
					<button *ngIf="rowData.id == row.id" mat-icon-button color="primary" (click)="redirectToDuplicate(row)">
						Duplicate Certificate
					</button>
				</td>
			</ng-container>
	
			<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
			<tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
		</table>
	
		<mat-paginator [length]="resultsLength" [pageSize]="pageSize">
	
		</mat-paginator>
	</div>
	<!-- Table end-->
