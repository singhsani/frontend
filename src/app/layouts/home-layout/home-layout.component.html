<div class="example-container">

    <mat-toolbar color="primary" class="example-toolbar">
        <mat-toolbar-row class="dasHeader">
            <div class="float-left">
                <!-- <button mat-icon-button (click)="isExpanded=!isExpanded; openSideNav();">
                    <mat-icon>menu</mat-icon>
                </button> -->
                <a mat-button routerLink="." class="logo">
                    <img src="assets/images/vmc-logo.png" alt="Vadodara Municipal Corporation">
                    <span class="logoText">Vadodara Municipal Corporation</span>
                </a>
                <span class="example-spacer"></span>
            </div>
            <!-- <button mat-icon-button position="end" (click)="selectLanguage('en')">EN</button>
            <button mat-icon-button position="end" (click)="selectLanguage('gu')">ગુજ</button> -->
            <div class="float-right">
                <!-- <button class="btn btn-warning mr-2" data-toggle="modal" data-target="#gujModal">
                    How to type in Gujarati?
                </button> -->
                <button mat-icon-button [matMenuTriggerFor]="menu" class="userName">
                    <!-- <mat-icon>face</mat-icon>
                    {{profileObj.firstName + ' ' + profileObj.lastName}} -->
                    <img [src]="profileObj.profilePic ? profileObj.profilePic : 'assets/images/no-image.jpg'" />
                    <span *ngIf="profileObj.middleName">{{profileObj.firstName +' '+ profileObj.middleName + ' ' + profileObj.lastName}}</span>
                    <span *ngIf="!profileObj.middleName">{{profileObj.firstName + ' ' + profileObj.lastName}}</span>
                    <mat-icon>arrow_drop_down</mat-icon>
                </button>
                <mat-menu #menu="matMenu">
                    <button mat-menu-item routerLink="/citizen/my-profile">Profile</button>
                    <button mat-menu-item (click)="onLogout()">Logout</button>
                </mat-menu>
            </div>
        </mat-toolbar-row>
    </mat-toolbar>
    
    <!-- <nav mat-tab-nav-bar>
        <a mat-tab-link *ngFor="let link of links" routerLink="/{{manageRoutes.getFullRoute(link.linkCode)}}" (click)="activeLink = link.linkName" [active]="activeLink == link.linkName"> {{link.linkName}} </a>
    </nav> -->
<div class="clearfix">
    <mat-tab-group (focusChange)="navigateToRoute($event)" mat-stretch-tabs [selectedIndex]="tabIndex" class="mainMenu">
        <mat-tab *ngFor="let link of links">
            <ng-template mat-tab-label>
                <mat-icon>thumb_up</mat-icon>
                {{link.linkName}}
            </ng-template>
        </mat-tab>
    </mat-tab-group>
</div>

    <div class="container clearfix">
        <router-outlet></router-outlet>
    </div>
    
</div>

<div class="modal" id="gujModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <!-- Modal Header -->
            <div class="modal-header">
                <h4 class="modal-title">
                    Gujarati typing, Confused? Just hit play button.
                </h4>
            </div>

            <!-- Modal body -->
            <div class="modal-body">
                <div class="embed-responsive embed-responsive-16by9 m-1 row">
                    <video class="embed-responsive-item col-md-12" controls>
                        <source src="assets/videos/Gujarati_Demo.mp4" type="video/mp4">
                    </video>
                </div>
            </div>

            <!-- Modal footer -->
            <div class="modal-footer">
                <button type="button" class="btn btn-danger" data-dismiss="modal">Close</button>
            </div>

        </div>
    </div>
</div>
