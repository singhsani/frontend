<div class="container">
    <app-title-bar [title]="'screen_title' | translate:'MyApplicationScreen'"></app-title-bar>
    <div class="example-container mat-elevation-z8">
        <div class="example-loading-shade" *ngIf="isLoadingResults || resultsLength==0">
            <mat-spinner *ngIf="isLoadingResults"></mat-spinner>
            <div class="example-rate-limit-reached" *ngIf="resultsLength==0">
                No record(s) found!
            </div>
        </div>

        <mat-table #table [dataSource]="dataSource" class="example-table firstCell" matSort matSortActive="created" matSortDisableClear matSortDirection="asc">

            <ng-container matColumnDef="id">
                <mat-header-cell *matHeaderCellDef>#</mat-header-cell>
                <mat-cell *matCellDef="let row; let i = index;">{{ paginator.pageIndex==0?i+1:((paginator.pageIndex+1)*10)+(i+1) }}</mat-cell>
            </ng-container>

            <ng-container matColumnDef="applicantName">
                <mat-header-cell *matHeaderCellDef>Applicant Name</mat-header-cell>
                <mat-cell *matCellDef="let row">{{ row.applicantName }}</mat-cell>
            </ng-container>

            <ng-container matColumnDef="fileNumber">
                <mat-header-cell *matHeaderCellDef>File Number</mat-header-cell>
                <mat-cell *matCellDef="let row">{{ row.fileNumber }}</mat-cell>
            </ng-container>

            <ng-container matColumnDef="fileStatus">
                <mat-header-cell *matHeaderCellDef>File Status</mat-header-cell>
                <mat-cell *matCellDef="let row" class="text-center">
                    <mat-chip-list>
                        <span class="{{getFileStatusClass(row.fileStatus)}}" selected="true">{{ row.fileStatus}}</span>
                        <span class="badge badge-pill badge-warning text-label" *ngIf="(row.fileStatus === 'SUBMITTED' && row.serviceDetail.appointmentRequired == true)" (click)="redirectAppointment(row.serviceDetail.code, row.serviceFormId)" selected="true">
                            Appointment
                        </span>
                    </mat-chip-list>
                </mat-cell>
            </ng-container>

            <ng-container matColumnDef="serviceType">
                <mat-header-cell *matHeaderCellDef>Service Name</mat-header-cell>
                <mat-cell *matCellDef="let row">{{ row.serviceDetail.name }}</mat-cell>
            </ng-container>

            <ng-container matColumnDef="action">
                <mat-header-cell *matHeaderCellDef>Action</mat-header-cell>
                <mat-cell *matCellDef="let row">
                    <button mat-icon-button [disabled]="!row.canEdit" color="primary" (click)="redirectToEdit(row.serviceDetail.code, row.serviceFormId)">
                        <mat-icon title="Edit">edit</mat-icon>
                    </button>
                    <button mat-icon-button [disabled]="!row.canDelete" color="warn" (click)="deleteRecord(row.serviceDetail.code, row.serviceFormId)">
                        <mat-icon title="Delete">delete</mat-icon>
                    </button>
                    <!-- <button class="btn btn-default" mwlConfirmationPopover [popoverTitle]="Delete" [popoverMessage]="Are you sure?" placement="left" (confirm)="deleteRecord(row.serviceDetail.code, row.serviceFormId)" (cancel)="">
                        <mat-icon title="Delete">delete</mat-icon>
                    </button> -->
                    <!-- <button mat-icon-button [disabled]="!row.canSubmit" [style.color]="'#4CAF50'" (click)="submitRecord(row.serviceDetail.code, row.serviceDetail.name, row.serviceFormId)">
                        <mat-icon title="Submit">done_all</mat-icon>
                    </button> -->
                    <button mat-icon-button [disabled]="row.canSubmit" (click)="redirectToEdit(row.serviceDetail.code, row.serviceFormId)">
                        <mat-icon title="Application Preview">remove_red_eye</mat-icon>
                    </button>
                    <button mat-icon-button [disabled]="row.canSubmit" (click)="printReceipt(row.serviceDetail.code, row.serviceDetail.name, row.serviceFormId)">
                        <mat-icon title="Print Receipt">print</mat-icon>
                    </button>
                </mat-cell>
            </ng-container>

            <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
            <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
        </mat-table>

        <mat-paginator [length]="resultsLength" [pageSize]="pageSize">
        </mat-paginator>
    </div>
</div>
