<mat-card class="col-md-12">

  <div class="row">
    <div class="col-md-6">
      <div class="section-title">
        <h4>Detail</h4>
      </div>
    </div>
    <div class="col-md-6 text-right">
      <button mat-raised-button class="ml-3" color="primary" type="button" (click)="cancelForm()">
        <mat-icon>skip_previous</mat-icon> Back
      </button>
    </div>
    <hr class="margin-top-10">
  </div>
  <mat-horizontal-stepper #stepper class="stepperToTab">
    <mat-step>
      <ng-template matStepLabel>Property Information</ng-template>
      <app-property-entry></app-property-entry>
    </mat-step>
    <mat-step>
      <ng-template matStepLabel>Occupier Detail</ng-template>
      <app-occupier-detail></app-occupier-detail>
    </mat-step>
    <mat-step>
      <ng-template matStepLabel>Unit Detail</ng-template>
      <app-unit-detail></app-unit-detail>
    </mat-step>
    <mat-step>
      <ng-template matStepLabel>Attachment</ng-template>
      <app-revaluation-document-upload></app-revaluation-document-upload>
    </mat-step>
    <!-- <mat-step>
      <ng-template matStepLabel>Approval</ng-template>
      <app-approval></app-approval>
    </mat-step> -->
  </mat-horizontal-stepper>
</mat-card>
