<mat-card>
  <div class="row">
    <div class="col-md-6">
      <h5>Bill Wise Detail</h5>
    </div>
    <div class="col-md-6 text-right">
      <button mat-raised-button color="primary" type="button" (click)="cancelForm()">
        <mat-icon>skip_previous</mat-icon> Back
      </button>
    </div>
    <hr >
  </div>
  <div class="row">
    <div class="col-md-12">
      <table mat-table [dataSource]="dataSource" >
        <ng-container matColumnDef="financialYear">
          <th mat-header-cell *matHeaderCellDef>Financial Year </th>
          <td mat-cell *matCellDef="let element"> {{element.financialYear}} </td>
        </ng-container>

        <ng-container matColumnDef="billNo">
          <th mat-header-cell *matHeaderCellDef> Bill No</th>
          <td mat-cell *matCellDef="let element"> {{element.billNo}} </td>
        </ng-container>
        <ng-container matColumnDef="billDate">
          <th mat-header-cell *matHeaderCellDef> Bill Date</th>
          <td mat-cell *matCellDef="let element"> {{element.billDate}} </td>
        </ng-container>
        <ng-container matColumnDef="billDueDate">
          <th mat-header-cell *matHeaderCellDef> Bill Due Date</th>
          <td mat-cell *matCellDef="let element"> {{element.billDueDate}} </td>
        </ng-container>
        <ng-container matColumnDef="billAmount">
          <th mat-header-cell *matHeaderCellDef> Bill Amount</th>
          <td mat-cell *matCellDef="let element"> {{element.billAmount}} </td>
        </ng-container>
        <ng-container matColumnDef="intrestOrPenaltyAmount">
          <th mat-header-cell *matHeaderCellDef> Interest/Penalty Amount</th>
          <td mat-cell *matCellDef="let element"> {{element.intrestOrPenaltyAmount}} </td>
        </ng-container>
        <ng-container matColumnDef="ownerDetail">
          <th mat-header-cell *matHeaderCellDef> Owner Detail</th>
          <td mat-cell *matCellDef="let element"> {{element.ownerDetail}} </td>
        </ng-container>
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef>
          </th>
          <td mat-cell *matCellDef="let element">
            <button mat-button title="Detail" class="btn-width-auto" color="accent" type="button" (click)="onDetailClick(element)">
              <mat-icon>details</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </div>
</mat-card>
