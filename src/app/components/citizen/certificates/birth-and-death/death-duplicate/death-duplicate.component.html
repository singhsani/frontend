<div class="container">
    <div class="row pt-4">
        <form [formGroup]="deathDuplicateForm">
            <mat-horizontal-stepper [linear]="false">

                <!-- first step start-->
                <mat-step [label]="stepLable1">
                    <app-basic-details [basicFormGroup]="deathDuplicateForm"></app-basic-details>
                    <div class="row">
                    
                        <mat-form-field class="col-md-4">
                            <input matInput maxlength="20" minlength="20" placeholder="{{'death_reg_number' | translate:translateKey}}" formControlName="deathRegNumber">
                            <control-messages [control]="deathDuplicateForm.controls.deathRegNumber"></control-messages>
                        </mat-form-field>
                    
                        <mat-form-field class="col-md-4">
                            <mat-select placeholder="{{'death_reg_year' | translate:translateKey}}" formControlName="deathRegYear">
                                <mat-option *ngFor="let deathyear of DeathRegYears" [value]="deathyear.code">
                                    {{deathyear.name}}
                                </mat-option>
                            </mat-select>
                            <control-messages [control]="deathDuplicateForm.controls.deathRegYear"></control-messages>
                        </mat-form-field>
                    
                    
                        <!-- <mat-form-field formGroupName="duplicateCopyMode" class="col-md-4">
                            <mat-select placeholder="{{'duplicate_copy_mode' | translate:translateKey}}" formControlName="code">
                                <mat-option *ngFor="let duplicatemode of DuplicateCopyMode" [value]="duplicatemode.code">
                                    {{duplicatemode.name}}
                                </mat-option>
                            </mat-select>
                            <control-messages [control]="deathDuplicateForm.controls.duplicateCopyMode.controls.code"></control-messages>
                        </mat-form-field>
                     -->
                        <mat-form-field class="col-md-4">
                            <input matInput [max]="maxDeathDate" [matDatepicker]="picker" placeholder="{{'death_date' | translate:translateKey}}" formControlName="deathDate"
                                (dateChange)="deathDateCalculator($event)">
                            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                            <mat-datepicker #picker></mat-datepicker>
                            <control-messages [control]="deathDuplicateForm.controls.deathDate"></control-messages>
                        </mat-form-field>
                    
                        <mat-form-field class="col-md-4">
                            <input matInput [max]="maxDeathDate" [min]="minDeathDate" [matDatepicker]="regpicker" placeholder="{{'death_reg_date' | translate:translateKey}}"
                                formControlName="deathRegDate" (dateChange)="deathRegCalculator($event)">
                            <mat-datepicker-toggle matSuffix [for]="regpicker"></mat-datepicker-toggle>
                            <mat-datepicker #regpicker></mat-datepicker>
                            <control-messages [control]="deathDuplicateForm.controls.deathRegDate"></control-messages>
                        </mat-form-field>
                    
                        <!-- <mat-form-field class="col-md-4">
                            <input matInput placeholder="{{'child_name' | translate:translateKey}}" name="childName" formControlName="childName">
                            <control-messages [control]="deathDuplicateForm.controls.childName"></control-messages>
                        </mat-form-field> -->
<!--                     
                        <mat-form-field class="col-md-4">
                            <input matInput type="number" placeholder="{{'total_copies' | translate:translateKey}}" formControlName="totalCopies">
                            <control-messages [control]="deathDuplicateForm.controls.totalCopies"></control-messages>
                        </mat-form-field> -->
                    
                    </div>
                    <app-action-bar [form]="deathDuplicateForm" [step]="'final'" (stepReset)="stepReset()" (handleErrors)="handleErrorsOnSubmit($event)"></app-action-bar>
                </mat-step>

            </mat-horizontal-stepper>
        </form>
    </div>
</div>
