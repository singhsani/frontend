
			<mat-card class="borderRadius10">
				<div class="headingBox">Registration
					<span>Sign up by entering the information below</span>
				</div>
				<form name="user-verify-form" [formGroup]="verifyForm" (ngSubmit)="verifyUser(verifyForm)" autocomplete="off" ngNativeValidate>

					<div class="row">
					<mat-form-field class="col-md-9">
						<input matInput type="text" OnlyNumber maxlength="5" minlength="5" placeholder="Enter OTP" formControlName="code"
						 required>
					</mat-form-field>
					<span class="col-md-3" *ngIf="!loading" style="margin-top: 25px; color: blue; cursor: pointer;" (click)="onForgotPassword();">Resend</span>
						<img class="col-md-3" *ngIf="loading" [class.disabled]="loading" src="assets/images/mainLoading.gif" />
					</div>
						<div class="text-center">
					<button type="submit" mat-raised-button color="primary" [disabled]="verifyForm.invalid">
						Submit
					</button>
				</div>
				</form>
			</mat-card>
