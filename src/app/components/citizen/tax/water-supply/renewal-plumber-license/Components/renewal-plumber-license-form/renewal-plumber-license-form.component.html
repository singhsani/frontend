<mat-horizontal-stepper #stepper class="stepperToTab">
    <mat-step>
        <ng-template matStepLabel>Applicant Details</ng-template>
        <app-applicant-detail-propertywater (stepChange)="stepChangedEvent($event)"
            (applicantDetails)="saveApplicantDetails($event)" [serviceType]="'WTR-RNW-PLUMB-LIC'">
        </app-applicant-detail-propertywater>
    </mat-step>
    <mat-step>
        <ng-template matStepLabel>Detail</ng-template>
        <mat-card>
            <div class="row">
                <div class="col-md-6">
                    <mat-form-field class="full-width-input" hidden>
                        <input matInput trim="blur" placeholder="Application Number" maxlength="20"
                            #ApplicationNo="ngModel" name="applicationNumber"
                            [(ngModel)]="applicationModel.applicationNumber">
                        <mat-error *ngIf="ApplicationNo.invalid">*Application Number is required.</mat-error>
                    </mat-form-field>
                </div>
            </div>
        </mat-card>
        <mat-card class="col-md-12 mt-3">
            <form #searchFormDetail="ngForm" (ngSubmit)="search(searchFormDetail)">
                <div class="row">
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input trim="blur" required matInput name="licenseNo" [(ngModel)]="licenseNo"
                                #LicenseNo="ngModel" placeholder="License Number">
                            <mat-error *ngIf="LicenseNo.invalid">*License Number is required.</mat-error>
                        </mat-form-field>
                    </div>
                    <div class="col-md-6">
                        <button class="mt-3" mat-raised-button color="primary" type="submit">
                            <mat-icon>search</mat-icon> Search
                        </button>
                    </div>
                </div>
            </form>
            <form #formDetail="ngForm" (ngSubmit)="saveDetail(formDetail)">
                <div class="row">
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input disabled matInput name="licenseForName" placeholder="License For"
                                [(ngModel)]="plumberLicenseModel.licenseForName">
                        </mat-form-field>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input disabled matInput placeholder="Name of Applicant" name="nameOfApplicant"
                                [(ngModel)]="plumberLicenseModel.nameOfApplicant">
                        </mat-form-field>
                    </div>
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input disabled matInput placeholder="Aadhaar Number" name="aadharNo"
                                [(ngModel)]="plumberLicenseModel.aadharNo">
                        </mat-form-field>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-12">
                        <mat-form-field class="full-width-input">
                            <textarea disabled matInput placeholder="Residential Address" name="residentialAddress"
                                [(ngModel)]="plumberLicenseModel.residentialAddress"></textarea>
                        </mat-form-field>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-12">
                        <mat-form-field class="full-width-input">
                            <textarea disabled matInput placeholder="Business Address" name="businessAddress"
                                [(ngModel)]="plumberLicenseModel.businessAddress"></textarea>
                        </mat-form-field>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input matInput disabled placeholder="Date Of Birth" name="birthdate"
                                [(ngModel)]="plumberLicenseModel.birthdate">
                        </mat-form-field>
                    </div>
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input disabled matInput placeholder="Educational Qualification"
                                name="educationQualificationName"
                                [(ngModel)]="plumberLicenseModel.educationQualificationName">
                        </mat-form-field>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input matInput required number-only maxlength="10" minlength="10" #MobileNo1="ngModel"
                                placeholder="Mobile Number 1" name="mobileNo1"
                                [(ngModel)]="plumberLicenseModel.mobileNo1">
                            <mat-error *ngIf="MobileNo1.invalid">*Mobile Number 1 is invalid.</mat-error>
                        </mat-form-field>
                    </div>
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input matInput number-only maxlength="10" minlength="10" #MobileNo2="ngModel"
                                placeholder="Mobile Number 2" name="mobileNo2"
                                [(ngModel)]="plumberLicenseModel.mobileNo2">
                            <mat-error *ngIf="MobileNo2.invalid">*Mobile Number 2 is invalid.</mat-error>
                        </mat-form-field>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input matInput number-only maxlength="10" minlength="10" #MobileNo3="ngModel"
                                placeholder="Mobile Number 3" name="mobileNo3"
                                [(ngModel)]="plumberLicenseModel.mobileNo3">
                            <mat-error *ngIf="MobileNo3.invalid">*Mobile Number 3 is invalid.</mat-error>
                        </mat-form-field>
                    </div>
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input required email matInput placeholder="Email" name="emailId" #EmailId="ngModel"
                                maxlength="50" [(ngModel)]="plumberLicenseModel.emailId">
                            <mat-error *ngIf="EmailId.invalid && EmailId.errors.required">*Email is required.
                            </mat-error>
                            <mat-error *ngIf="EmailId.invalid && EmailId.errors.email">*Email is not valid.</mat-error>
                        </mat-form-field>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-12">
                        <mat-form-field class="full-width-input">
                            <textarea matInput disabled placeholder="Work Experience Detail" name="workExperienceDetail"
                                [(ngModel)]="plumberLicenseModel.workExperienceDetail"></textarea>
                        </mat-form-field>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input matInput disabled placeholder="License Valid Till Date" name="licenseValidTill"
                                [(ngModel)]="plumberLicenseModel.licenseValidTill">
                        </mat-form-field>
                    </div>
                    <div class="col-md-6">
                        <mat-form-field class="full-width-input">
                            <input #LicenseRenewUpto="ngModel" matInput required [matDatepicker]="RenewedUpTo"
                                placeholder="Renew Up To Date" name="licenseRenewUpto" [min]="renewUptoDate.minDate"
                                [max]="renewUptoDate.maxDate" [(ngModel)]="plumberLicenseModel.licenseRenewUpto"
                                mask-date>
                            <mat-datepicker-toggle matSuffix [for]="RenewedUpTo"></mat-datepicker-toggle>
                            <mat-datepicker #RenewedUpTo disabled="false"></mat-datepicker>
                            <mat-error>{{errorMessage.dateFormateErrorMsg}}</mat-error>
                            <div class="default-show-hint mat-hint mat-right" align="end">
                                {{errorMessage.dateFormateHint}}</div>
                        </mat-form-field>
                    </div>
                </div>

                <div class="col-sm-12 col-md-12 p-4 mt-3" *ngIf="isShowSaveButton">
                    <button mat-raised-button class="ml-3 pull-left" color="primary" type="button" (click)="moveStepper(0)">
                        <mat-icon>skip_previous</mat-icon>Back
                    </button>
                    <button class="ml-3 pull-right" mat-raised-button color="primary" type="submit">
                        <mat-icon>save</mat-icon> Save & Next
                    </button>
                    <!-- <button class="ml-3 pull-right" mat-raised-button color="warn" type="button" (click)="clear()">
                        <mat-icon>clear_all</mat-icon> Clear
                    </button> -->
                </div>

            </form>
        </mat-card>
    </mat-step>
    <mat-step>
        <ng-template matStepLabel>Attachment</ng-template>
        <mat-card>
            <div class="row">
                <ng-container *ngFor="let doc of plumbeRenewalLicenseDocumentUploadDocs">
                    <div class="col-md-4">
                        <label>{{doc.documentLabelEn}}<span *ngIf="doc.mandatory">*</span></label>
                        <file-upload-water-tax [form]="plumbeRenewalLicenseDocumentUploadDocs" [uploadModel]="doc">
                        </file-upload-water-tax>
                    </div>
                </ng-container>
            </div>
            <div class="col-sm-12 col-md-12">
                <button mat-raised-button class="ml-3 pull-left" color="primary" type="button" (click)="moveStepper(1)">
                    <mat-icon>skip_previous</mat-icon>Back
                </button>
                <button mat-raised-button class="ml-3 pull-right" color="primary" (click)="onSubmitApproved()" type="button">
                    <mat-icon>save</mat-icon>Submit
                </button>
            </div>
        </mat-card>
    </mat-step>
</mat-horizontal-stepper>
