<app-title-bar [title]="'screen_title' | translate: translateKey"></app-title-bar>

<mat-card [hidden]="serachLicenceObj.isDisplayRenewLicenceForm" class="mt-4 formClass">
	<mat-form-field class="col-md-10">
		<input matInput required placeholder="{{'search_by_application_no' | translate:translateKey}}" [(ngModel)]="serachLicenceObj.searchLicenceNumber">
	</mat-form-field>
	<button class="col-md-2" [disabled]="!serachLicenceObj.searchLicenceNumber" mat-raised-button color="primary" (click)="searchLicence()">{{'search' | translate:translateKey}}</button>
</mat-card>
<mat-card [hidden]="!serachLicenceObj.isDisplayRenewLicenceForm" class="formClass cardBorder">
	<form [formGroup]="animalPondRenewForm">
		<mat-tab-group [(selectedIndex)]="tabIndex" dynamicHeight="true" mat-stretch-tabs class="stepperNav">
      <!-- step 1 Starts -->
      <mat-tab>
        <ng-template mat-tab-label>
          <div>{{'license_holder_detail' | translate:translateKey}}</div>
        </ng-template>

        <div class="row">

          <mat-form-field class="col-md-6">
            <input matInput type="text" required maxlength="100" appValidationFields validationFieldsType='onlyNameWithSpace'
              placeholder="{{'holder_name' | translate:translateKey}}" formControlName="holderName">
            <control-messages [control]="foodLicNewForm.controls.holderName"></control-messages>
          </mat-form-field>

          <mat-form-field class="col-md-6">
            <textarea matInput rows="3" cols="50" maxlength="500" formControlName="holderAddress" placeholder="{{ 'holder_address' | translate:translateKey }}"
              required> </textarea>
            <control-messages [control]="foodLicNewForm.controls.holderAddress"></control-messages>
          </mat-form-field>

          <mat-form-field class="col-md-6">
            <input matInput type="text" required maxlength="100" appValidationFields validationFieldsType='onlyNameWithSpace'
              placeholder="{{'firm_name' | translate:translateKey}}" formControlName="firmName">
            <control-messages [control]="foodLicNewForm.controls.firmName"></control-messages>
          </mat-form-field>

          <mat-form-field class="col-md-6">
            <textarea matInput rows="3" cols="50" maxlength="500" formControlName="firmAddress" placeholder="{{ 'firm_address' | translate:translateKey }}"
              required> </textarea>
            <control-messages [control]="foodLicNewForm.controls.firmAddress"></control-messages>
          </mat-form-field>
        </div>
        <!-- <mat-form-field class="col-md-4">
					<input matInput OnlyNumber maxlength="10" formControlName="holderTelephoneNo" placeholder="{{'holder_telephone_no' | translate:translateKey}}">
					<control-messages [control]="foodLicNewForm.controls.holderTelephoneNo"></control-messages>
				</mat-form-field>
				<mat-form-field class="col-md-4">
					<input matInput OnlyNumber required maxlength="10" formControlName="holderMobileNo" placeholder="{{'holder_mobile_no' | translate:translateKey}}">
					<control-messages [control]="foodLicNewForm.controls.holderMobileNo"></control-messages>
				</mat-form-field>
				<mat-form-field class="col-md-4">
					<input matInput OnlyNumber maxlength="12" formControlName="holderFaxNo" placeholder="{{'holder_fax_no' | translate:translateKey}}">
					<control-messages [control]="foodLicNewForm.controls.holderFaxNo"></control-messages>
				</mat-form-field>
				<mat-form-field class="col-md-4">
					<input matInput OnlyNumber maxlength="12" required formControlName="holderAadharNo" placeholder="{{'holder_aadhar_no' | translate:translateKey}}">
					<control-messages [control]="foodLicNewForm.controls.holderAadharNo"></control-messages>
				</mat-form-field>
				<mat-form-field class="col-md-4">
					<input matInput appAlphaNumeric maxlength="10" required formControlName="holderPanNo" placeholder="{{'holder_pan_no' | translate:translateKey}}">
					<control-messages [control]="foodLicNewForm.controls.holderPanNo"></control-messages>
				</mat-form-field> -->

        <app-action-bar [form]="foodLicNewForm" (tabIndex)="onTabChange($event)" [stepInfo]="{step: 'step1', next: 1, back: 0}"></app-action-bar>
      </mat-tab>
      <!-- step 1 Ends -->

      <!-- step 2 Starts -->
      <mat-tab>
        <ng-template mat-tab-label>
          <div>{{'business_detail' | translate:translateKey}}</div>
        </ng-template>
        <div class="row">
          <div class="col-md-4 ngSelect" formGroupName="firmZone">
            <ng-select placeholder="{{'firm_zone' | translate:translateKey}} *" formControlName="code" (change)="onChangeZone($event);foodLicNewForm.get('firmAdministrativeWard').reset()">
              <ng-option *ngFor="let zone of FIRM_ZONE" [value]="zone.code">{{zone.name}}</ng-option>
            </ng-select>
            <control-messages [control]="foodLicNewForm.get('firmZone').controls.code"></control-messages>
          </div>
          <div class="col-md-4 ngSelect" formGroupName="firmAdministrativeWard">
            <ng-select placeholder="{{'ward_no' | translate:translateKey}} *" formControlName="code">
              <ng-option *ngFor="let ward of WARD" [value]="ward.code">{{ward.name}}</ng-option>
            </ng-select>
            <control-messages [control]="foodLicNewForm.get('firmAdministrativeWard').controls.code"></control-messages>
          </div>
        </div>

        <div class="row">

          <mat-form-field class="col-md-4">
            <input matInput formControlName="firmCity" appValidationFields validationFieldsType='onlyNameWithOutSpace'
              placeholder="{{'firm_city' | translate:translateKey}}">
            <control-messages [control]="foodLicNewForm.controls.firmCity"></control-messages>
          </mat-form-field>
          <mat-form-field class="col-md-4">
            <input matInput type="tel" OnlyNumber formControlName="firmPincode" placeholder="{{'pincode' | translate: translateKey }}"
              minlength="6" maxlength="6">
            <control-messages [control]="foodLicNewForm.controls.firmPincode"></control-messages>
          </mat-form-field>
          <mat-form-field class="col-md-4">
            <input matInput OnlyNumber required maxlength="10" formControlName="mobileNo" placeholder="{{'holder_mobile_no' | translate:translateKey}}">
            <control-messages [control]="foodLicNewForm.controls.mobileNo"></control-messages>
          </mat-form-field>
          <mat-form-field class="col-md-4">
            <input matInput OnlyNumber maxlength="10" formControlName="firmLandLineNo" placeholder="{{'holder_telephone_no' | translate:translateKey}}">
            <control-messages [control]="foodLicNewForm.controls.firmLandLineNo"></control-messages>
          </mat-form-field>
          <mat-form-field class="col-md-4">
            <input matInput appPreventSpace placeholder="{{'applicant_email' | translate:translateKey}}" type="email"
              formControlName="firmEmailId" required>
            <control-messages [control]="foodLicNewForm.controls.firmEmailId"></control-messages>
          </mat-form-field>

          <div class="col-md-4 ngSelect" formGroupName="businessType">
            <ng-select placeholder="{{'business_type' | translate:translateKey}} *" formControlName="code" (change)="onChangeCatType($event);foodLicNewForm.get('businessCategories').reset()">
              <ng-option *ngFor="let type of FOOD_BUSINESS_TYPES" [value]="type.code">{{type.name}}</ng-option>
            </ng-select>
            <control-messages [control]="foodLicNewForm.get('businessType').controls.code"></control-messages>
          </div>
          <div class="col-md-4 ngSelect" formGroupName="regLicType">
            <ng-select placeholder="{{'regLic_type_single_or_multi' | translate:translateKey}} *" formControlName="code">
              <ng-option *ngFor="let type of FOOD_REG_LIC_SINGLE_OR_MULTIPLE" [value]="type.code">{{type.name}}</ng-option>
            </ng-select>
            <control-messages [control]="foodLicNewForm.controls.regLicType.controls.code"></control-messages>
          </div>

          <div class="col-md-4 ngSelect" *ngIf="foodLicNewForm.get('businessType').controls.code.value === 'FOOD_MANUFACTURER_PROCESSOR_BUSINESSTYPE'">
            <ng-select [multiple]="foodLicNewForm.controls.regLicType.controls.code.value == 'FOOD_REG_LIC_MULTIPLE'"
              placeholder="{{'business_categories' | translate:translateKey}} *">
              <ng-option *ngFor="let type of FOOD_OTHERS_BUSINESSTYPE" [value]="type.code">{{type.name}}</ng-option>
            </ng-select>
            <control-messages [control]="foodLicNewForm.get('businessType').controls.code"></control-messages>
          </div>
          <div class="col-md-4" *ngIf="foodLicNewForm.get('businessType').controls.code.value === 'FOOD_OTHER'">
            <mat-form-field>
              <mat-select formControlName="businessCategories" placeholder="{{'business_categories_list' | translate:translateKey}} *"
                [multiple]="foodLicNewForm.controls.regLicType.controls.code.value == 'FOOD_REG_LIC_SINGLE'">
                <mat-option *ngFor="let topping of FOOD_BUSINESS_CATE_MANU" [value]="topping">{{topping.name}}</mat-option>
              </mat-select>
            </mat-form-field>
          </div>

          <div class="col-md-4 ngSelect" formGroupName="businessTurnOver">
            <ng-select placeholder="{{'business_turnover' | translate:translateKey}} *" formControlName="code">
              <ng-option *ngFor="let statusId of FOOD_BUSINESS_TURNOVER" [value]="statusId.code">{{statusId.name}}</ng-option>
            </ng-select>
            <control-messages [control]="foodLicNewForm.controls.businessTurnOver.controls.code"></control-messages>
          </div>
          <div class="col-md-4 ngSelect" formGroupName="isRegOrLic">
            <ng-select placeholder="{{'isRegOrLic' | translate:translateKey}} *" formControlName="code">
              <ng-option *ngFor="let statusId of FOOD_IS_REG_OR_LIC" [value]="statusId.code">{{statusId.name}}</ng-option>
            </ng-select>
            <control-messages [control]="foodLicNewForm.controls.isRegOrLic.controls.code"></control-messages>
          </div>

          <div class="col-md-4 ngSelect" formGroupName="licenceForNoOfYear">
            <ng-select placeholder="{{'licenceForNoOfYear' | translate:translateKey}} *" formControlName="code">
              <ng-option *ngFor="let statusId of FOOD_LICENCE_NO_OF_YEAR" [value]="statusId.code">{{statusId.name}}</ng-option>
            </ng-select>
            <control-messages [control]="foodLicNewForm.controls.licenceForNoOfYear.controls.code"></control-messages>
          </div>
          <div class="col-md-4 ngSelect" formGroupName="feesType">
            <ng-select placeholder="{{'feesType' | translate:translateKey}} *" formControlName="code">
              <ng-option *ngFor="let statusId of FOOD_LIC_FEES_TYPE" [value]="statusId.code">{{statusId.name}}</ng-option>
            </ng-select>
            <control-messages [control]="foodLicNewForm.controls.feesType.controls.code"></control-messages>
          </div>
          <mat-form-field class="col-md-4">
            <input matInput OnlyNumber required maxlength="10" formControlName="totalFeesAmount" placeholder="{{'total_fees_amount' | translate:translateKey}}">
            <control-messages [control]="foodLicNewForm.controls.totalFeesAmount"></control-messages>
          </mat-form-field>
          <div class="col-md-4 ngSelect" formGroupName="paymentMode">
            <ng-select placeholder="{{'payment_mode' | translate:translateKey}} *" formControlName="code">
              <ng-option *ngFor="let statusId of FOOD_PAYMENT_MODE" [value]="statusId.code">{{statusId.name}}</ng-option>
            </ng-select>
            <control-messages [control]="foodLicNewForm.controls.paymentMode.controls.code"></control-messages>
          </div>
        </div>

        <app-action-bar [uploadFiles]="uploadFileArray" [form]="foodLicNewForm" (handleErrors)="handleErrorsOnSubmit($event)"
          (tabIndex)="onTabChange($event)" [stepInfo]="{step: 'final', next:4, back:0} "></app-action-bar>
      </mat-tab>
      <!-- step 2 Ends -->
		</mat-tab-group>
	</form>
</mat-card>
