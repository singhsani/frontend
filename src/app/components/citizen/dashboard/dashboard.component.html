<div class="container">
    <div class="row pt-4">
        <div class="col-4 text-center">
            <mat-card>
                <mat-icon>account_circle</mat-icon>
                <mat-card-title>Marriage Certificate</mat-card-title>
                <mat-card-actions>
                    <button mat-raised-button color="primary" (click)="createRecord('marriageReg')">
						<mat-icon>input</mat-icon> New Application
					</button>
                </mat-card-actions>
            </mat-card>
        </div>
        <div class="col-4 text-center">
            <mat-card>
                <mat-icon>account_circle</mat-icon>
                <mat-card-title>Birth Certificate</mat-card-title>
                <mat-card-actions>
                    <button mat-raised-button color="primary" (click)="createRecord('birthReg')">
                        <mat-icon>input</mat-icon> New Application
                    </button>
                </mat-card-actions>
            </mat-card>
        </div>
        <div class="col-4 text-center">
            <mat-card>
                <mat-icon>account_circle</mat-icon>
                <mat-card-title>Death Certificate</mat-card-title>
                <mat-card-actions>
                    <button mat-raised-button color="primary" (click)="createRecord('deathReg')">
                        <mat-icon>input</mat-icon> New Application
                    </button>
                </mat-card-actions>
            </mat-card>
        </div>
    </div>
